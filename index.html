<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Faceit Cases</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }
        h2 { margin-top: 0; }
        .cases {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .case {
            background: #16213e;
            border-radius: 20px;
            padding: 25px 15px;
            width: 120px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .case:active { transform: scale(0.95); background: #0f3460; }
        .case .icon { font-size: 45px; display: block; margin-bottom: 10px; }
        .case .name { font-weight: bold; margin: 5px 0; }
        .case .cost { color: gold; font-size: 14px; }

        /* Окно подтверждения */
        #confirmOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            padding: 40px 20px;
        }
        #confirmCase {
            font-size: 80px;
            margin-bottom: 20px;
        }
        #openBtn {
            background: gold;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        #openBtn:active { background: #e6c200; transform: scale(0.95); }
        #cancelBtn {
            background: transparent;
            border: 2px solid #aaa;
            color: #aaa;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            margin-left: 15px;
            cursor: pointer;
        }

        /* Анимация открытия */
        #animationOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            padding: 30px 10px;
        }
        #slotWindow {
            width: 90%;
            height: 140px;
            margin: 60px auto 20px;
            background: #2c2c44;
            border: 3px solid gold;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        /* Указатель – крупная золотая стрелка с анимацией */
        #pointer {
            position: absolute;
            left: 50%;
            top: -30px;
            transform: translateX(-50%);
            color: gold;
            font-size: 42px;
            z-index: 5;
            filter: drop-shadow(0 0 10px gold);
            animation: pointerBounce 0.8s infinite alternate;
        }
        @keyframes pointerBounce {
            from { top: -30px; }
            to { top: -20px; }
        }
        #slotStrip {
            display: flex;
            transition: transform 7s cubic-bezier(0.15, 0.85, 0.35, 1.0);
            will-change: transform;
        }
        .slotItem {
            min-width: 120px;
            max-width: 120px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px solid gold;
            background: #1e1e3f;
        }
        .slotItem:nth-child(even) {
            background: #22224a;
        }
        .slotItem img {
            max-width: 100px;
            max-height: 100px;
            filter: drop-shadow(0 0 5px black);
            /* Убираем mix-blend-mode – скины будут яркими */
        }

        #resultContainer {
            margin-top: 30px;
            opacity: 0;
            transform: scale(0.8);
            transition: 0.5s;
        }
        #resultContainer.show {
            opacity: 1;
            transform: scale(1);
        }
        #resultSkin {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        #tradeUrlInput {
            width: 80%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #2c2c44;
            color: white;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
        }
        #tradeUrlInput::placeholder {
            color: #aaa;
        }
        #withdrawBtn {
            background: gold;
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        #withdrawBtn:active {
            background: #e6c200;
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <h2>🎁 Открой кейс Faceit LFG</h2>
    <div class="cases" id="casesContainer"></div>

    <!-- Окно подтверждения -->
    <div id="confirmOverlay">
        <div id="confirmCase"></div>
        <div style="margin: 20px 0; font-size: 18px;" id="confirmCost"></div>
        <button id="openBtn">🔓 Открыть</button>
        <button id="cancelBtn">Отмена</button>
    </div>

    <div id="animationOverlay">
        <div id="slotWindow">
            <div id="pointer">▼</div>
            <div id="slotStrip"></div>
        </div>
        <div id="resultContainer">
            <div id="resultSkin"></div>
            <input type="text" id="tradeUrlInput" placeholder="Вставьте свою трейд-ссылку">
            <button id="withdrawBtn">🎁 Вывести</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        if (tg.requestFullscreen) tg.requestFullscreen();

        const cases = [
            {
                name: "Обычный",
                cost: "3 реф.",
                icon: "📦",
                items: [
                    { name: "M4A4 | Choppa (FT)", img: "https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Choppa%20(Field-Tested).webp" },
                    { name: "AK-47 | Olive Polycam (FT)", img: "https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20Olive%20Polycam%20(Field-Tested).webp" },
                    { name: "R8 Revolver | Grip (FT)", img: "https://cdn2.csgo.com/item/image/width=916/R8%20Revolver%20%7C%20Grip%20(Field-Tested).webp" },
                    { name: "M4A4 | Steel Work (FT)", img: "https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Steel%20Work%20(Field-Tested).webp" },
                    { name: "SSG 08 | Calligrafaux (WW)", img: "https://cdn2.csgo.com/item/image/width=916/SSG%2008%20%7C%20Calligrafaux%20(Well-Worn).webp" },
                    { name: "Glock-18 | Ocean Topo (FT)", img: "https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Ocean%20Topo%20(Field-Tested).webp" },
                    { name: "AK-47 | VariCamo Grey (FT)", img: "https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20VariCamo%20Grey%20(Field-Tested).webp" },
                    { name: "M4A1-S | Wash me plz (FT)", img: "https://cdn2.csgo.com/item/image/width=916/M4A1-S%20%7C%20Wash%20me%20plz%20(Field-Tested).webp" },
                    { name: "Glock-18 | Moonrise (FT)", img: "https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Moonrise%20(Field-Tested).webp" }
                ],
                cheap: [3,4,5,6,7],
                expensive: [0,1,2],
                unobtainable: [8]
            }
        ];

        const container = document.getElementById('casesContainer');
        cases.forEach((c, index) => {
            const div = document.createElement('div');
            div.className = 'case';
            div.innerHTML = `<span class="icon">${c.icon}</span><div class="name">${c.name}</div><div class="cost">${c.cost}</div>`;
            div.onclick = () => showConfirm(index);
            container.appendChild(div);
        });

        const confirmOverlay = document.getElementById('confirmOverlay');
        const confirmCase = document.getElementById('confirmCase');
        const confirmCost = document.getElementById('confirmCost');
        const openBtn = document.getElementById('openBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        let selectedCaseIndex = 0;

        function showConfirm(index) {
            selectedCaseIndex = index;
            const c = cases[index];
            confirmCase.textContent = c.icon;
            confirmCost.textContent = `${c.name} – стоимость: ${c.cost}`;
            confirmOverlay.style.display = 'block';
            openBtn.onclick = () => {
                confirmOverlay.style.display = 'none';
                startSlotAnimation(index);
            };
        }

        cancelBtn.onclick = () => {
            confirmOverlay.style.display = 'none';
        };

        const overlay = document.getElementById('animationOverlay');
        const strip = document.getElementById('slotStrip');
        const resultContainer = document.getElementById('resultContainer');
        const resultSkin = document.getElementById('resultSkin');
        const tradeUrlInput = document.getElementById('tradeUrlInput');
        const withdrawBtn = document.getElementById('withdrawBtn');

        function startSlotAnimation(caseIndex) {
            const c = cases[caseIndex];
            const all = c.items;

            resultContainer.classList.remove('show');
            tradeUrlInput.value = '';

            const scrollItems = [];
            for (let i = 0; i < 30; i++) {
                scrollItems.push(all[Math.floor(Math.random() * all.length)]);
            }

            const rand = Math.random() * 100;
            let winItem;
            if (rand < 5) {
                winItem = all[c.expensive[Math.floor(Math.random() * c.expensive.length)]];
            } else {
                winItem = all[c.cheap[Math.floor(Math.random() * c.cheap.length)]];
            }
            scrollItems.push(winItem);

            strip.innerHTML = '';
            scrollItems.forEach(item => {
                const slotDiv = document.createElement('div');
                slotDiv.className = 'slotItem';
                const img = document.createElement('img');
                img.src = item.img;
                img.alt = item.name;
                slotDiv.appendChild(img);
                strip.appendChild(slotDiv);
            });

            strip.style.transition = 'none';
            strip.style.transform = 'translateX(0)';
            overlay.style.display = 'block';

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const itemWidth = 122; // 120px + 2px border
                    const totalScroll = (scrollItems.length - 3) * itemWidth;
                    strip.style.transition = 'transform 7s cubic-bezier(0.15, 0.85, 0.35, 1.0)';
                    strip.style.transform = `translateX(-${totalScroll}px)`;
                });
            });

            setTimeout(() => {
                resultSkin.innerHTML = `✨ Выпало: <b>${winItem.name}</b>`;
                resultContainer.classList.add('show');

                withdrawBtn.onclick = () => {
                    const tradeLink = tradeUrlInput.value.trim();
                    if (!tradeLink) {
                        alert('Введите трейд-ссылку!');
                        return;
                    }
                    tg.sendData(JSON.stringify({
                        skin: winItem.name,
                        trade_link: tradeLink
                    }));
                    alert('Запрос на вывод отправлен!');
                    overlay.style.display = 'none';
                    resultContainer.classList.remove('show');
                };
            }, 7200);
        }

        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                overlay.style.display = 'none';
                resultContainer.classList.remove('show');
            }
        });
    </script>
</body>
</html>
