<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Case Battle | Инвентарь и вывод</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }

        .app {
            max-width: 640px;
            width: 100%;
            background: rgba(6, 10, 24, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 64px;
            padding: 20px 16px 32px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 25px 40px -12px black;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #01020bc9;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .stat-card {
            background: #00000066;
            border-radius: 40px;
            padding: 5px 18px;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .stat-label { font-size: 13px; color: #9aa5cf; }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #7e9ef5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .owner-badge {
            background: #ffcc44;
            color: #1f1a00;
            font-size: 12px;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin: 16px 0 12px;
        }
        .tab-btn {
            background: #111827;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }
        .tab-btn.active {
            background: #2f4788;
            box-shadow: 0 0 8px #4c7aff;
        }

        .case-tabs {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-bottom: 28px;
        }
        .case-btn {
            background: #111827;
            border: 1px solid #2a3655;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 15px;
            color: #cbd5ff;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .case-btn.active {
            background: linear-gradient(120deg, #2f4788, #1f3172);
            border-color: #7795ff;
            color: white;
            box-shadow: 0 0 14px #4c7aff;
        }
        .case-btn.disabled {
            opacity: 0.45;
            cursor: not-allowed;
            filter: grayscale(0.2);
        }

        .slot-container {
            position: relative;
            margin: 30px 0 20px;
            background: #03061740;
            border-radius: 48px;
            padding: 20px 12px;
            border: 1px solid #2b3658;
        }
        .track-wrapper {
            overflow-x: auto;
            scroll-behavior: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            cursor: grab;
            border-radius: 36px;
        }
        .track-wrapper::-webkit-scrollbar {
            display: none;
        }
        .slot-track {
            display: flex;
            flex-wrap: nowrap;
            gap: 18px;
            padding: 12px 8px;
            will-change: scroll-position;
        }
        .slot-card {
            flex: 0 0 auto;
            width: 170px;
            background: #0f1422dd;
            border-radius: 32px;
            padding: 16px 10px;
            text-align: center;
            backdrop-filter: blur(4px);
            transition: 0.1s;
            border: 1px solid rgba(255,210,150,0.2);
        }
        .slot-card.common { background: #19213a; }
        .slot-card.rare {
            background: linear-gradient(145deg, #601f1f, #8b2e2e);
            box-shadow: 0 0 14px #ff5e5e;
            border-color: #ff9f7a;
        }
        .slot-card.mythic {
            background: radial-gradient(circle at 30% 20%, #b38f2c, #6b5200);
            box-shadow: 0 0 20px #ffd966;
            border-color: #ffea9e;
        }
        .slot-card img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            filter: drop-shadow(0 8px 12px black);
            border-radius: 20px;
            margin-bottom: 8px;
        }
        .skin-name {
            font-size: 12px;
            font-weight: 600;
            background: #000000aa;
            padding: 5px 8px;
            border-radius: 30px;
            color: white;
        }

        .arrow-indicator {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            filter: drop-shadow(0 4px 6px black);
            z-index: 12;
            text-shadow: 0 0 6px cyan;
            pointer-events: none;
        }
        .arrow-indicator span {
            display: block;
            font-size: 52px;
            color: #ffdd77;
            -webkit-text-stroke: 2px #b55a00;
        }
        .center-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 3px;
            background: rgba(255,215,0,0.6);
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 8px gold;
        }

        .buttons {
            display: flex;
            gap: 16px;
            margin-top: 18px;
            justify-content: center;
        }
        .open-btn {
            flex: 1;
            background: linear-gradient(115deg, #ffb347, #ff6324);
            border: none;
            border-radius: 80px;
            padding: 14px 0;
            font-size: 20px;
            font-weight: 800;
            color: #1c1f2e;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 6px 18px black;
            text-align: center;
        }
        .open-btn:active {
            transform: scale(0.97);
        }
        .slow-btn {
            background: linear-gradient(115deg, #5f7ef0, #2b4cbe);
        }

        .inventory-panel {
            margin-top: 20px;
            background: #02061780;
            border-radius: 32px;
            padding: 16px;
            display: none;
        }
        .inventory-panel.show {
            display: block;
        }
        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .trade-link-input {
            background: #0f1422;
            border: 1px solid #4c6a9e;
            padding: 8px 12px;
            border-radius: 40px;
            color: white;
            width: 200px;
            font-size: 12px;
        }
        .save-trade-btn {
            background: #2f4788;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
        }
        .inventory-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .inventory-item {
            background: #0a0f1f;
            border-radius: 24px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .inv-skin-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .inv-skin-info img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }
        .withdraw-btn {
            background: #ff6324;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .withdraw-btn.disabled {
            background: #555;
            cursor: not-allowed;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000dd;
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            z-index: 1000;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-card {
            background: #0f1429f2;
            border-radius: 64px;
            padding: 28px 20px;
            width: 290px;
            text-align: center;
            border: 2px solid goldenrod;
        }
        .modal-card img {
            width: 140px;
            margin: 14px 0;
            border-radius: 24px;
        }
        .modal-close {
            background: #32416b;
            padding: 12px;
            border-radius: 40px;
            margin-top: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2a4f;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 1100;
            display: none;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="stats">
        <div class="stat-card">
            <span class="stat-label">👥 РЕФЕРАЛЫ</span>
            <span class="stat-value" id="referralCount">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">🎁 ДОСТУПНО</span>
            <span class="stat-value" id="casesLeft">0</span>
        </div>
        <div id="ownerBadge" class="owner-badge" style="display: none;">👑 Владелец</div>
    </div>

    <div class="tabs">
        <div class="tab-btn active" data-tab="cases">🎲 Кейсы</div>
        <div class="tab-btn" data-tab="inventory">📦 Инвентарь</div>
    </div>

    <!-- Панель кейсов -->
    <div id="casesPanel">
        <div class="case-tabs" id="caseTabs">
            <div data-req="3" class="case-btn">🔓 КЕЙС 3</div>
            <div data-req="5" class="case-btn">💎 КЕЙС 5</div>
            <div data-req="10" class="case-btn">🔥 КЕЙС 10</div>
        </div>

        <div class="slot-container">
            <div class="arrow-indicator"><span>▼</span></div>
            <div class="center-line"></div>
            <div class="track-wrapper" id="trackWrapper">
                <div class="slot-track" id="slotTrack"></div>
            </div>
        </div>

        <div class="buttons">
            <button class="open-btn slow-btn" id="slowOpenBtn">🐢 5 СЕКУНД</button>
            <button class="open-btn" id="fastOpenBtn">⚡ БЫСТРО</button>
        </div>
    </div>

    <!-- Панель инвентаря -->
    <div id="inventoryPanel" class="inventory-panel">
        <div class="inventory-header">
            <input type="text" id="tradeLinkInput" class="trade-link-input" placeholder="Введите Trade Link">
            <div class="save-trade-btn" id="saveTradeLinkBtn">💾 Сохранить</div>
        </div>
        <div class="inventory-list" id="inventoryList"></div>
    </div>
</div>

<div id="resultModal" class="modal">
    <div class="modal-card">
        <h3>✨ ВАМ ВЫПАЛО ✨</h3>
        <img id="modalImg" src="" alt="skin">
        <p id="modalSkinText" style="margin: 10px 0; font-weight: bold;"></p>
        <div class="modal-close" id="closeModalBtn">ЗАКРЫТЬ</div>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<script>
    // ======================== TELEGRAM ========================
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.expand();
        tg.enableClosingConfirmation();
        tg.MainButton.hide();
    }

    // Владельцы (сюда же будет отправляться заявка)
    const OWNER_IDS = [1225488154, 912778066];
    let currentUserId = null;
    let currentUsername = "unknown";
    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
        currentUserId = tg.initDataUnsafe.user.id;
        currentUsername = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || "user";
    } else {
        currentUserId = 1225488154;
        currentUsername = "test_user";
    }
    const isOwner = OWNER_IDS.includes(currentUserId);
    if (isOwner) {
        document.getElementById('ownerBadge').style.display = 'inline-block';
    }

    // ======================== БАЗА СКИНОВ ========================
    const skinLibrary = [
        { name: "M4A4 | Choppa (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Choppa%20(Field-Tested).webp", rarity: "rare" },
        { name: "AK-47 | Olive Polycam (Well-Worn)", image: "https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20Olive%20Polycam%20(Field-Tested).webp", rarity: "rare" },
        { name: "R8 Revolver | Grip (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/R8%20Revolver%20%7C%20Grip%20(Field-Tested).webp", rarity: "rare" },
        { name: "M4A4 | Steel Work (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Steel%20Work%20(Field-Tested).webp", rarity: "common" },
        { name: "SSG 08 | Calligrafaux (Well-Worn)", image: "https://cdn2.csgo.com/item/image/width=916/SSG%2008%20%7C%20Calligrafaux%20(Well-Worn).webp", rarity: "common" },
        { name: "Glock-18 | Ocean Topo (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Ocean%20Topo%20(Field-Tested).webp", rarity: "common" },
        { name: "AK-47 | VariCamo Grey (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20VariCamo%20Grey%20(Field-Tested).webp", rarity: "common" },
        { name: "M4A1-S | Wash me plz (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/M4A1-S%20%7C%20Wash%20me%20plz%20(Field-Tested).webp", rarity: "common" },
        { name: "Glock-18 | Moonrise (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Moonrise%20(Field-Tested).webp", rarity: "mythic" }
    ];

    // Получить случайный не-мифический скин
    function getRandomNonMythic() {
        const nonMythic = skinLibrary.filter(s => s.rarity !== 'mythic');
        let totalWeight = 0;
        const weighted = nonMythic.map(s => {
            let w = (s.rarity === 'rare') ? 30 : 70;
            totalWeight += w;
            return { skin: s, weight: w };
        });
        let rand = Math.random() * totalWeight;
        let acc = 0;
        for (let item of weighted) {
            acc += item.weight;
            if (rand <= acc) return item.skin;
        }
        return nonMythic[0];
    }

    // Генерация ленты: чередуем, но мифики будут только в чётных позициях (гарантируем, что центральный никогда не мифик)
    function buildDisplayArray(length = 60) {
        const result = [];
        const mythic = skinLibrary.find(s => s.rarity === 'mythic');
        for (let i = 0; i < length; i++) {
            if (i % 2 === 0) {
                result.push({ ...getRandomNonMythic() });
            } else {
                result.push({ ...mythic });
            }
        }
        // небольшое перемешивание, но не перемещаем мифики в позиции, которые могут стать центральными
        // Для надёжности после сборки дополнительно проверим центральную область в текущем рендере
        return result;
    }

    let currentDisplayArray = [];

    // Состояние пользователя
    let selectedReq = 3;
    let userReferrals = 0;
    let openedCase3 = 0, openedCase5 = 0, openedCase10 = 0;

    // Инвентарь: каждый скин имеет уникальный id и статус
    let inventory = []; // { id, name, image, rarity, status: 'available' | 'pending' }

    // Trade link
    let tradeLink = "";

    // DOM
    const trackEl = document.getElementById('slotTrack');
    const wrapper = document.getElementById('trackWrapper');

    // Генерация уникального ID
    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    // Загрузка данных
    function loadUserData() {
        const storedInv = localStorage.getItem(`inv_${currentUserId}`);
        if (storedInv) {
            inventory = JSON.parse(storedInv);
        } else {
            inventory = [];
        }
        const storedTrade = localStorage.getItem(`trade_${currentUserId}`);
        if (storedTrade) tradeLink = storedTrade;
        const tradeInput = document.getElementById('tradeLinkInput');
        if (tradeInput) tradeInput.value = tradeLink;
        renderInventory();
    }

    function saveInventory() {
        localStorage.setItem(`inv_${currentUserId}`, JSON.stringify(inventory));
    }

    function saveTradeLink() {
        localStorage.setItem(`trade_${currentUserId}`, tradeLink);
    }

    function addToInventory(skin) {
        const newItem = { ...skin, id: generateId(), status: 'available' };
        inventory.push(newItem);
        saveInventory();
        renderInventory();
        showToast(`🎁 ${skin.name} добавлен в инвентарь!`);
    }

    // Отправка заявки владельцам (через бэкенд)
    async function sendWithdrawRequestToOwners(skinId, skinName) {
        // Здесь вы должны отправить POST на ваш сервер, который через бота отправит сообщение владельцам
        // Например:
        try {
            const response = await fetch('https://your-backend.com/api/withdraw-request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: currentUserId,
                    username: currentUsername,
                    skinId: skinId,
                    skinName: skinName,
                    tradeLink: tradeLink
                })
            });
            if (response.ok) {
                showToast("Заявка отправлена владельцам");
            } else {
                showToast("Ошибка отправки, попробуйте позже");
            }
        } catch (e) {
            console.error(e);
            showToast("Не удалось отправить заявку (проверьте соединение)");
        }
        // Для демонстрации показываем в консоли, что нужно отправить
        console.log(`[ЗАЯВКА] Пользователь ${currentUserId} (${currentUsername}) хочет вывести ${skinName}. Trade link: ${tradeLink}`);
        console.log(`[ДЕЙСТВИЕ ВЛАДЕЛЬЦА] Чтобы подтвердить вывод, выполните: confirmWithdraw("${skinId}")`);
    }

    // Функция для подтверждения вывода (вызывается владельцем через бота или вручную)
    window.confirmWithdraw = function(skinId) {
        const index = inventory.findIndex(item => item.id === skinId);
        if (index !== -1 && inventory[index].status === 'pending') {
            inventory.splice(index, 1);
            saveInventory();
            renderInventory();
            showToast("Скин удалён из инвентаря (вывод подтверждён)");
            if (tg) tg.showAlert("Вывод подтверждён, скин удалён");
        } else {
            showToast("Скин не найден или уже обработан");
        }
    };

    // Отрисовка инвентаря
    function renderInventory() {
        const container = document.getElementById('inventoryList');
        if (!container) return;
        if (inventory.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:20px;">Пусто. Откройте кейсы!</div>';
            return;
        }
        container.innerHTML = '';
        inventory.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'inventory-item';
            const isPending = item.status === 'pending';
            div.innerHTML = `
                <div class="inv-skin-info">
                    <img src="${item.image}" onerror="this.src='https://placehold.co/48x48'">
                    <span style="font-weight:bold;">${item.name}</span>
                </div>
                <button class="withdraw-btn" data-id="${item.id}" ${isPending ? 'disabled' : ''}>${isPending ? '⏳ В процессе...' : '💸 Вывести'}</button>
            `;
            container.appendChild(div);
        });
        // Навесить обработчики
        document.querySelectorAll('.withdraw-btn').forEach(btn => {
            if (btn.disabled) return;
            btn.addEventListener('click', async (e) => {
                const skinId = btn.getAttribute('data-id');
                const skinItem = inventory.find(i => i.id === skinId);
                if (!skinItem) return;
                if (skinItem.status === 'pending') {
                    showToast("Этот скин уже в процессе вывода");
                    return;
                }
                if (!tradeLink || tradeLink.trim() === '') {
                    showToast("❌ Сначала сохраните Trade Link!");
                    return;
                }
                // Меняем статус
                skinItem.status = 'pending';
                saveInventory();
                renderInventory();
                // Отправляем заявку владельцам
                await sendWithdrawRequestToOwners(skinId, skinItem.name);
                showToast("Заявка отправлена. Ожидайте подтверждения от владельца.");
            });
        });
    }

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    // Механика прокрутки: принудительно убираем жёлтый из центра после остановки
    function ensureCenterIsNotMythic() {
        let centerCard = getCenterCard();
        let centerSkin = centerCard ? getSkinFromCard(centerCard) : null;
        if (centerSkin && centerSkin.rarity === 'mythic') {
            const cards = Array.from(document.querySelectorAll('.slot-card'));
            const centerIndex = cards.indexOf(centerCard);
            let targetIndex = -1;
            // ищем ближайший non-mythic
            for (let offset = 1; offset < cards.length; offset++) {
                const leftIdx = centerIndex - offset;
                const rightIdx = centerIndex + offset;
                if (leftIdx >= 0) {
                    const leftSkin = getSkinFromCard(cards[leftIdx]);
                    if (leftSkin && leftSkin.rarity !== 'mythic') {
                        targetIndex = leftIdx;
                        break;
                    }
                }
                if (rightIdx < cards.length) {
                    const rightSkin = getSkinFromCard(cards[rightIdx]);
                    if (rightSkin && rightSkin.rarity !== 'mythic') {
                        targetIndex = rightIdx;
                        break;
                    }
                }
            }
            if (targetIndex !== -1) {
                cards[targetIndex].scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                // Небольшая задержка, чтобы скролл успел отработать
                return new Promise(resolve => setTimeout(resolve, 200));
            }
        }
        return Promise.resolve();
    }

    function getCenterCard() {
        const containerRect = wrapper.getBoundingClientRect();
        const centerX = containerRect.left + containerRect.width / 2;
        let closestCard = null;
        let minDist = Infinity;
        const cards = document.querySelectorAll('.slot-card');
        for (let card of cards) {
            const rect = card.getBoundingClientRect();
            const cardCenter = rect.left + rect.width / 2;
            const dist = Math.abs(centerX - cardCenter);
            if (dist < minDist) {
                minDist = dist;
                closestCard = card;
            }
        }
        return closestCard;
    }

    function getSkinFromCard(card) {
        if (!card) return null;
        const nameDiv = card.querySelector('.skin-name');
        if (!nameDiv) return null;
        const skinName = nameDiv.innerText;
        return currentDisplayArray.find(s => s.name === skinName) || null;
    }

    function renderSlot() {
        if (!currentDisplayArray.length) {
            currentDisplayArray = buildDisplayArray(60);
        }
        trackEl.innerHTML = '';
        currentDisplayArray.forEach(skin => {
            const card = document.createElement('div');
            card.className = `slot-card ${skin.rarity}`;
            card.innerHTML = `
                <img src="${skin.image}" onerror="this.src='https://placehold.co/120x120?text=Error'">
                <div class="skin-name">${skin.name}</div>
            `;
            trackEl.appendChild(card);
        });
        setTimeout(() => {
            wrapper.scrollLeft = (wrapper.scrollWidth - wrapper.clientWidth) / 2;
        }, 10);
    }

    let isSpinning = false;
    let animFrame = null;

    function startSpinWithDuration(durationMs) {
        if (isSpinning) return;
        isSpinning = true;
        const startTime = performance.now();
        const startPos = wrapper.scrollLeft;
        const totalWidth = wrapper.scrollWidth - wrapper.clientWidth;
        const fullLoops = 2 + Math.random() * 2;
        const delta = totalWidth * fullLoops + (Math.random() * totalWidth);
        
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }
        function step(now) {
            const elapsed = now - startTime;
            let t = Math.min(1, elapsed / durationMs);
            const ease = easeOutCubic(t);
            const newPos = startPos + delta * ease;
            let limited = newPos % totalWidth;
            if (limited < 0) limited += totalWidth;
            wrapper.scrollLeft = limited;
            if (t < 1) {
                animFrame = requestAnimationFrame(step);
            } else {
                finishSpinAndDrop();
            }
        }
        animFrame = requestAnimationFrame(step);

        async function finishSpinAndDrop() {
            if (animFrame) cancelAnimationFrame(animFrame);
            // Принудительно убираем жёлтый из центра
            await ensureCenterIsNotMythic();
            const centerCard = getCenterCard();
            let droppedSkin = null;
            if (centerCard) {
                droppedSkin = getSkinFromCard(centerCard);
            }
            if (!droppedSkin || droppedSkin.rarity === 'mythic') {
                droppedSkin = getRandomNonMythic();
            }
            showResultModal(droppedSkin);
            addToInventory(droppedSkin);
            
            if (!isOwner) {
                if (selectedReq === 3) openedCase3++;
                else if (selectedReq === 5) openedCase5++;
                else openedCase10++;
            } else {
                if (tg) tg.showAlert("👑 Владелец, кейс открыт бесплатно");
            }
            refreshUI();
            currentDisplayArray = buildDisplayArray(60);
            renderSlot();
            isSpinning = false;
        }
    }

    function showResultModal(skin) {
        const modal = document.getElementById('resultModal');
        const img = document.getElementById('modalImg');
        const text = document.getElementById('modalSkinText');
        img.src = skin.image;
        text.innerText = skin.name;
        modal.classList.add('active');
        if (tg) tg.HapticFeedback?.notificationOccurred('success');
    }

    function canOpenCase() {
        if (isOwner) return true;
        let available = 0;
        if (selectedReq === 3) available = Math.floor(userReferrals / 3) - openedCase3;
        else if (selectedReq === 5) available = Math.floor(userReferrals / 5) - openedCase5;
        else available = Math.floor(userReferrals / 10) - openedCase10;
        return available > 0;
    }

    function refreshUI() {
        document.getElementById('referralCount').innerText = userReferrals;
        let totalLeft = 0;
        if (!isOwner) {
            totalLeft += Math.floor(userReferrals / 3) - openedCase3;
            totalLeft += Math.floor(userReferrals / 5) - openedCase5;
            totalLeft += Math.floor(userReferrals / 10) - openedCase10;
        } else {
            totalLeft = 999;
        }
        document.getElementById('casesLeft').innerText = isOwner ? "∞" : totalLeft;

        const btn3 = document.querySelector('[data-req="3"]');
        const btn5 = document.querySelector('[data-req="5"]');
        const btn10 = document.querySelector('[data-req="10"]');
        let avail3 = isOwner ? true : (Math.floor(userReferrals / 3) - openedCase3 > 0);
        let avail5 = isOwner ? true : (Math.floor(userReferrals / 5) - openedCase5 > 0);
        let avail10 = isOwner ? true : (Math.floor(userReferrals / 10) - openedCase10 > 0);
        btn3.classList.toggle('disabled', !avail3);
        btn5.classList.toggle('disabled', !avail5);
        btn10.classList.toggle('disabled', !avail10);

        document.querySelectorAll('.case-btn').forEach(btn => btn.classList.remove('active'));
        if (selectedReq === 3) btn3.classList.add('active');
        if (selectedReq === 5) btn5.classList.add('active');
        if (selectedReq === 10) btn10.classList.add('active');
    }

    function setCase(req) {
        if (!isOwner) {
            let avail = false;
            if (req === 3) avail = (Math.floor(userReferrals / 3) - openedCase3 > 0);
            else if (req === 5) avail = (Math.floor(userReferrals / 5) - openedCase5 > 0);
            else avail = (Math.floor(userReferrals / 10) - openedCase10 > 0);
            if (!avail && userReferrals < req) {
                if (tg) tg.showAlert(`❌ Нет доступных открытий для кейса ${req}`);
                return;
            }
        }
        selectedReq = req;
        refreshUI();
    }

    function attemptOpen(durationMs) {
        if (!canOpenCase()) {
            if (tg) tg.showAlert(`❌ Не хватает рефералов! Нужно ${selectedReq} приглашений.`);
            else alert(`Нужно ${selectedReq} рефералов`);
            return;
        }
        startSpinWithDuration(durationMs);
    }

    function initReferrals() {
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
            let val = parseInt(tg.initDataUnsafe.start_param);
            userReferrals = isNaN(val) ? 0 : val;
        } else {
            userReferrals = isOwner ? 20 : 2;
        }
        if (!isOwner && userReferrals === 0) userReferrals = 2;
        refreshUI();
    }

    // Переключение вкладок
    function switchTab(tab) {
        const casesPanel = document.getElementById('casesPanel');
        const invPanel = document.getElementById('inventoryPanel');
        if (tab === 'cases') {
            casesPanel.style.display = 'block';
            invPanel.classList.remove('show');
        } else {
            casesPanel.style.display = 'none';
            invPanel.classList.add('show');
            renderInventory();
        }
    }

    // События
    document.getElementById('slowOpenBtn').addEventListener('click', () => attemptOpen(5000));
    document.getElementById('fastOpenBtn').addEventListener('click', () => attemptOpen(1200));
    document.querySelectorAll('.case-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const req = parseInt(btn.getAttribute('data-req'));
            if (!isNaN(req)) setCase(req);
        });
    });
    document.getElementById('closeModalBtn').addEventListener('click', () => {
        document.getElementById('resultModal').classList.remove('active');
    });
    document.getElementById('resultModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('resultModal')) {
            document.getElementById('resultModal').classList.remove('active');
        }
    });

    document.getElementById('saveTradeLinkBtn').addEventListener('click', () => {
        const input = document.getElementById('tradeLinkInput');
        tradeLink = input.value.trim();
        saveTradeLink();
        showToast("Trade Link сохранён!");
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            switchTab(btn.getAttribute('data-tab'));
        });
    });

    // Загрузка
    loadUserData();
    currentDisplayArray = buildDisplayArray(60);
    renderSlot();
    initReferrals();
    setCase(3);
    switchTab('cases');
</script>
</body>
</html>
