<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Case Battle | Надёжный вывод + Mythic шанс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }

        .app {
            max-width: 640px;
            width: 100%;
            background: rgba(6, 10, 24, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 64px;
            padding: 20px 16px 32px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 25px 40px -12px black;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #01020bc9;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .stat-card {
            background: #00000066;
            border-radius: 40px;
            padding: 5px 18px;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .stat-label { font-size: 13px; color: #9aa5cf; }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #7e9ef5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .owner-badge {
            background: #ffcc44;
            color: #1f1a00;
            font-size: 12px;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin: 16px 0 12px;
        }
        .tab-btn {
            background: #111827;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }
        .tab-btn.active {
            background: #2f4788;
            box-shadow: 0 0 8px #4c7aff;
        }

        .case-tabs {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-bottom: 28px;
        }
        .case-btn {
            background: #111827;
            border: 1px solid #2a3655;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 15px;
            color: #cbd5ff;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .case-btn.active {
            background: linear-gradient(120deg, #2f4788, #1f3172);
            border-color: #7795ff;
            color: white;
            box-shadow: 0 0 14px #4c7aff;
        }
        .case-btn.disabled {
            opacity: 0.45;
            cursor: not-allowed;
            filter: grayscale(0.2);
        }

        .slot-container {
            position: relative;
            margin: 30px 0 20px;
            background: #03061740;
            border-radius: 48px;
            padding: 20px 12px;
            border: 1px solid #2b3658;
        }
        .track-wrapper {
            overflow-x: auto;
            scroll-behavior: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            cursor: grab;
            border-radius: 36px;
        }
        .track-wrapper::-webkit-scrollbar {
            display: none;
        }
        .slot-track {
            display: flex;
            flex-wrap: nowrap;
            gap: 18px;
            padding: 12px 8px;
            will-change: scroll-position;
        }
        .slot-card {
            flex: 0 0 auto;
            width: 170px;
            background: #0f1422dd;
            border-radius: 32px;
            padding: 16px 10px;
            text-align: center;
            backdrop-filter: blur(4px);
            transition: 0.1s;
            border: 1px solid rgba(255,210,150,0.2);
        }
        .slot-card.common { background: #19213a; }
        .slot-card.rare {
            background: linear-gradient(145deg, #601f1f, #8b2e2e);
            box-shadow: 0 0 14px #ff5e5e;
            border-color: #ff9f7a;
        }
        .slot-card.mythic {
            background: radial-gradient(circle at 30% 20%, #b38f2c, #6b5200);
            box-shadow: 0 0 20px #ffd966;
            border-color: #ffea9e;
        }
        .slot-card img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            filter: drop-shadow(0 8px 12px black);
            border-radius: 20px;
            margin-bottom: 8px;
        }
        .skin-name {
            font-size: 12px;
            font-weight: 600;
            background: #000000aa;
            padding: 5px 8px;
            border-radius: 30px;
            color: white;
        }

        .arrow-indicator {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            filter: drop-shadow(0 4px 6px black);
            z-index: 12;
            text-shadow: 0 0 6px cyan;
            pointer-events: none;
        }
        .arrow-indicator span {
            display: block;
            font-size: 52px;
            color: #ffdd77;
            -webkit-text-stroke: 2px #b55a00;
        }
        .center-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 3px;
            background: rgba(255,215,0,0.6);
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 8px gold;
        }

        .buttons {
            display: flex;
            gap: 16px;
            margin-top: 18px;
            justify-content: center;
        }
        .open-btn {
            flex: 1;
            background: linear-gradient(115deg, #ffb347, #ff6324);
            border: none;
            border-radius: 80px;
            padding: 14px 0;
            font-size: 20px;
            font-weight: 800;
            color: #1c1f2e;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 6px 18px black;
            text-align: center;
        }
        .open-btn:active {
            transform: scale(0.97);
        }
        .slow-btn {
            background: linear-gradient(115deg, #5f7ef0, #2b4cbe);
        }

        .inventory-panel, .settings-panel {
            margin-top: 20px;
            background: #02061780;
            border-radius: 32px;
            padding: 16px;
            display: none;
        }
        .inventory-panel.show, .settings-panel.show {
            display: block;
        }
        .inventory-header, .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .trade-link-input, .token-input, .owner-id-input {
            background: #0f1422;
            border: 1px solid #4c6a9e;
            padding: 8px 12px;
            border-radius: 40px;
            color: white;
            width: 200px;
            font-size: 12px;
        }
        .save-trade-btn, .save-settings-btn {
            background: #2f4788;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
        }
        .inventory-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .inventory-item {
            background: #0a0f1f;
            border-radius: 24px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .inv-skin-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .inv-skin-info img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }
        .withdraw-btn {
            background: #ff6324;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .withdraw-btn.disabled {
            background: #555;
            cursor: not-allowed;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000dd;
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            z-index: 1000;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-card {
            background: #0f1429f2;
            border-radius: 64px;
            padding: 28px 20px;
            width: 290px;
            text-align: center;
            border: 2px solid goldenrod;
        }
        .modal-card img {
            width: 140px;
            margin: 14px 0;
            border-radius: 24px;
        }
        .modal-close {
            background: #32416b;
            padding: 12px;
            border-radius: 40px;
            margin-top: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2a4f;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 1100;
            display: none;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="stats">
        <div class="stat-card">
            <span class="stat-label">👥 РЕФЕРАЛЫ</span>
            <span class="stat-value" id="referralCount">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">🎁 ДОСТУПНО</span>
            <span class="stat-value" id="casesLeft">0</span>
        </div>
        <div id="ownerBadge" class="owner-badge" style="display: none;">👑 Владелец</div>
    </div>

    <div class="tabs">
        <div class="tab-btn active" data-tab="cases">🎲 Кейсы</div>
        <div class="tab-btn" data-tab="inventory">📦 Инвентарь</div>
        <div class="tab-btn" data-tab="settings">⚙️ Настройки</div>
    </div>

    <!-- Панель кейсов -->
    <div id="casesPanel">
        <div class="case-tabs" id="caseTabs">
            <div data-req="3" class="case-btn">🔓 КЕЙС 3</div>
            <div data-req="5" class="case-btn">💎 КЕЙС 5</div>
            <div data-req="10" class="case-btn">🔥 КЕЙС 10</div>
        </div>

        <div class="slot-container">
            <div class="arrow-indicator"><span>▼</span></div>
            <div class="center-line"></div>
            <div class="track-wrapper" id="trackWrapper">
                <div class="slot-track" id="slotTrack"></div>
            </div>
        </div>

        <div class="buttons">
            <button class="open-btn slow-btn" id="slowOpenBtn">🐢 5 СЕКУНД</button>
            <button class="open-btn" id="fastOpenBtn">⚡ БЫСТРО</button>
        </div>
    </div>

    <!-- Панель инвентаря -->
    <div id="inventoryPanel" class="inventory-panel">
        <div class="inventory-header">
            <input type="text" id="tradeLinkInput" class="trade-link-input" placeholder="Введите Trade Link">
            <div class="save-trade-btn" id="saveTradeLinkBtn">💾 Сохранить</div>
        </div>
        <div class="inventory-list" id="inventoryList"></div>
    </div>

    <!-- Панель настроек (токен и ID владельцев) -->
    <div id="settingsPanel" class="settings-panel">
        <div class="settings-header">
            <input type="text" id="botTokenInput" class="token-input" placeholder="Bot Token (например, 123456:ABC-DEF)">
            <input type="text" id="ownerIdsInput" class="owner-id-input" placeholder="ID владельцев (через запятую)">
            <div class="save-settings-btn" id="saveSettingsBtn">💾 Сохранить</div>
        </div>
        <div style="font-size:12px; color:#aaa;">Внимание: токен хранится только на вашем устройстве. Для продакшена используйте серверную часть.</div>
    </div>
</div>

<div id="resultModal" class="modal">
    <div class="modal-card">
        <h3>✨ ВАМ ВЫПАЛО ✨</h3>
        <img id="modalImg" src="" alt="skin">
        <p id="modalSkinText" style="margin: 10px 0; font-weight: bold;"></p>
        <div class="modal-close" id="closeModalBtn">ЗАКРЫТЬ</div>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<script>
    // ======================== TELEGRAM ========================
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.expand();
        tg.enableClosingConfirmation();
        tg.MainButton.hide();
    }

    // Получаем данные пользователя
    let currentUserId = null;
    let currentUsername = "unknown";
    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
        currentUserId = tg.initDataUnsafe.user.id;
        currentUsername = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || "user";
    } else {
        currentUserId = 1225488154; // демо
        currentUsername = "test_user";
    }

    // Владельцы (загружаются из настроек)
    let ownerIds = [1225488154, 912778066]; // дефолтные
    let botToken = "";

    // Загружаем настройки
    function loadSettings() {
        const storedToken = localStorage.getItem(`botToken_${currentUserId}`);
        if (storedToken) botToken = storedToken;
        document.getElementById('botTokenInput').value = botToken;
        const storedOwners = localStorage.getItem(`ownerIds_${currentUserId}`);
        if (storedOwners) {
            try {
                ownerIds = JSON.parse(storedOwners);
                document.getElementById('ownerIdsInput').value = ownerIds.join(',');
            } catch(e) {}
        }
    }
    function saveSettings() {
        const token = document.getElementById('botTokenInput').value.trim();
        const ownersStr = document.getElementById('ownerIdsInput').value.trim();
        botToken = token;
        localStorage.setItem(`botToken_${currentUserId}`, token);
        if (ownersStr) {
            const ids = ownersStr.split(',').map(id => parseInt(id.trim())).filter(id => !isNaN(id));
            if (ids.length) {
                ownerIds = ids;
                localStorage.setItem(`ownerIds_${currentUserId}`, JSON.stringify(ownerIds));
            }
        }
        showToast("Настройки сохранены");
    }

    // Проверка, является ли текущий пользователь владельцем
    const isOwner = () => ownerIds.includes(currentUserId);
    function updateOwnerBadge() {
        if (isOwner()) document.getElementById('ownerBadge').style.display = 'inline-block';
        else document.getElementById('ownerBadge').style.display = 'none';
    }

    // ======================== БАЗА СКИНОВ ========================
    const skinLibrary = [
        { name: "M4A4 | Choppa (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Choppa%20(Field-Tested).webp", rarity: "rare" },
        { name: "AK-47 | Olive Polycam (Well-Worn)", image: "https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20Olive%20Polycam%20(Field-Tested).webp", rarity: "rare" },
        { name: "R8 Revolver | Grip (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/R8%20Revolver%20%7C%20Grip%20(Field-Tested).webp", rarity: "rare" },
        { name: "M4A4 | Steel Work (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Steel%20Work%20(Field-Tested).webp", rarity: "common" },
        { name: "SSG 08 | Calligrafaux (Well-Worn)", image: "https://cdn2.csgo.com/item/image/width=916/SSG%2008%20%7C%20Calligrafaux%20(Well-Worn).webp", rarity: "common" },
        { name: "Glock-18 | Ocean Topo (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Ocean%20Topo%20(Field-Tested).webp", rarity: "common" },
        { name: "AK-47 | VariCamo Grey (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20VariCamo%20Grey%20(Field-Tested).webp", rarity: "common" },
        { name: "M4A1-S | Wash me plz (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/M4A1-S%20%7C%20Wash%20me%20plz%20(Field-Tested).webp", rarity: "common" },
        { name: "Glock-18 | Moonrise (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Moonrise%20(Field-Tested).webp", rarity: "mythic" }
    ];

    // Функция получения случайного НЕ mythic с шансами 70% common, 30% rare
    function getRandomNonMythic() {
        const nonMythic = skinLibrary.filter(s => s.rarity !== 'mythic');
        let totalWeight = 0;
        const weighted = nonMythic.map(s => {
            let w = (s.rarity === 'rare') ? 30 : 70;
            totalWeight += w;
            return { skin: s, weight: w };
        });
        let rand = Math.random() * totalWeight;
        let acc = 0;
        for (let item of weighted) {
            acc += item.weight;
            if (rand <= acc) return item.skin;
        }
        return nonMythic[0];
    }

    // НОВАЯ ФУНКЦИЯ: mythic выпадает с шансом 0.00000001% (1e-8)
    function getRandomSkinWithMythicChance() {
        const MYTHIC_CHANCE = 1e-8; // 0.00000001% — меняйте здесь для тестов (например, 0.01 = 1%)
        if (Math.random() < MYTHIC_CHANCE) {
            const mythicSkin = skinLibrary.find(s => s.rarity === 'mythic');
            if (mythicSkin) return { ...mythicSkin };
        }
        return getRandomNonMythic();
    }

    // Генерация ленты с мификами (для красоты), реальный дроп теперь может быть mythic
    function buildDisplayArray(length = 60) {
        const result = [];
        const mythic = skinLibrary.find(s => s.rarity === 'mythic');
        for (let i = 0; i < length; i++) {
            if (i % 2 === 0) {
                result.push({ ...getRandomNonMythic() });
            } else {
                result.push({ ...mythic });
            }
        }
        // Небольшое перемешивание
        for (let i = 0; i < result.length; i++) {
            if (Math.random() < 0.15 && i+1 < result.length) {
                [result[i], result[i+1]] = [result[i+1], result[i]];
            }
        }
        return result;
    }

    let currentDisplayArray = [];

    // Состояние пользователя
    let selectedReq = 3;
    let userReferrals = 0;
    let openedCase3 = 0, openedCase5 = 0, openedCase10 = 0;

    // Инвентарь
    let inventory = []; // { id, name, image, rarity, status }

    // Trade link
    let tradeLink = "";

    // DOM
    const trackEl = document.getElementById('slotTrack');
    const wrapper = document.getElementById('trackWrapper');

    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    function loadUserData() {
        const storedInv = localStorage.getItem(`inv_${currentUserId}`);
        inventory = storedInv ? JSON.parse(storedInv) : [];
        const storedTrade = localStorage.getItem(`trade_${currentUserId}`);
        tradeLink = storedTrade || "";
        document.getElementById('tradeLinkInput').value = tradeLink;
        renderInventory();
    }
    function saveInventory() { localStorage.setItem(`inv_${currentUserId}`, JSON.stringify(inventory)); }
    function saveTradeLink() {
        tradeLink = document.getElementById('tradeLinkInput').value.trim();
        localStorage.setItem(`trade_${currentUserId}`, tradeLink);
        showToast("Trade Link сохранён");
    }

    function addToInventory(skin) {
        const newItem = { ...skin, id: generateId(), status: 'available' };
        inventory.push(newItem);
        saveInventory();
        renderInventory();
        showToast(`🎁 ${skin.name} добавлен в инвентарь!`);
    }

    // Отправка заявки владельцам через Telegram Bot API
    async function sendWithdrawRequestToOwners(skinId, skinName) {
        if (!botToken) {
            showToast("❌ Не указан Bot Token в настройках!");
            return false;
        }
        if (ownerIds.length === 0) {
            showToast("❌ Не указаны ID владельцев в настройках!");
            return false;
        }
        const message = `🔔 НОВАЯ ЗАЯВКА НА ВЫВОД\n\n👤 ID: ${currentUserId}\n👤 Ник: ${currentUsername}\n🔗 Trade Link: ${tradeLink}\n🎁 Скин: ${skinName}\n🆔 ID скина: ${skinId}`;
        let success = false;
        for (let ownerId of ownerIds) {
            try {
                const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: ownerId, text: message, parse_mode: 'HTML' })
                });
                const data = await response.json();
                if (data.ok) success = true;
                else console.error(`Ошибка отправки владельцу ${ownerId}:`, data);
            } catch(e) { console.error(e); }
        }
        if (success) {
            showToast("✅ Заявка отправлена владельцам");
            return true;
        } else {
            showToast("❌ Не удалось отправить заявку. Проверьте токен и ID.");
            return false;
        }
    }

    // Функция для подтверждения вывода (вызывается извне или по кнопке от владельца)
    window.confirmWithdraw = function(skinId) {
        const index = inventory.findIndex(item => item.id === skinId);
        if (index !== -1 && inventory[index].status === 'pending') {
            inventory.splice(index, 1);
            saveInventory();
            renderInventory();
            showToast("✅ Вывод подтверждён, скин удалён из инвентаря");
            if (tg) tg.showAlert("Скин успешно выведен!");
        } else {
            showToast("Скин не найден или уже обработан");
        }
    };

    function renderInventory() {
        const container = document.getElementById('inventoryList');
        if (!container) return;
        if (inventory.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:20px;">Пусто. Откройте кейсы!</div>';
            return;
        }
        container.innerHTML = '';
        inventory.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'inventory-item';
            const isPending = item.status === 'pending';
            div.innerHTML = `
                <div class="inv-skin-info">
                    <img src="${item.image}" onerror="this.src='https://placehold.co/48x48'">
                    <span style="font-weight:bold;">${item.name}</span>
                </div>
                <button class="withdraw-btn" data-id="${item.id}" ${isPending ? 'disabled' : ''}>${isPending ? '⏳ В процессе...' : '💸 Вывести'}</button>
            `;
            container.appendChild(div);
        });
        document.querySelectorAll('.withdraw-btn:not([disabled])').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const skinId = btn.getAttribute('data-id');
                const skinItem = inventory.find(i => i.id === skinId);
                if (!skinItem) return;
                if (skinItem.status === 'pending') {
                    showToast("Этот скин уже в процессе вывода");
                    return;
                }
                if (!tradeLink || tradeLink.trim() === '') {
                    showToast("❌ Сначала сохраните Trade Link в инвентаре!");
                    return;
                }
                // Меняем статус
                skinItem.status = 'pending';
                saveInventory();
                renderInventory();
                // Отправляем заявку
                const sent = await sendWithdrawRequestToOwners(skinId, skinItem.name);
                if (!sent) {
                    // Возвращаем статус обратно
                    skinItem.status = 'available';
                    saveInventory();
                    renderInventory();
                }
            });
        });
    }

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    // ========== МЕХАНИКА ПРОКРУТКИ (Mythic может выпасть) ==========
    function getCenterCard() {
        const containerRect = wrapper.getBoundingClientRect();
        const centerX = containerRect.left + containerRect.width / 2;
        let closestCard = null, minDist = Infinity;
        document.querySelectorAll('.slot-card').forEach(card => {
            const rect = card.getBoundingClientRect();
            const cardCenter = rect.left + rect.width / 2;
            const dist = Math.abs(centerX - cardCenter);
            if (dist < minDist) { minDist = dist; closestCard = card; }
        });
        return closestCard;
    }
    function getSkinFromCard(card) {
        if (!card) return null;
        const nameDiv = card.querySelector('.skin-name');
        if (!nameDiv) return null;
        const skinName = nameDiv.innerText;
        return currentDisplayArray.find(s => s.name === skinName) || null;
    }

    function renderSlot() {
        if (!currentDisplayArray.length) currentDisplayArray = buildDisplayArray(60);
        trackEl.innerHTML = '';
        currentDisplayArray.forEach(skin => {
            const card = document.createElement('div');
            card.className = `slot-card ${skin.rarity}`;
            card.innerHTML = `<img src="${skin.image}" onerror="this.src='https://placehold.co/120x120'"><div class="skin-name">${skin.name}</div>`;
            trackEl.appendChild(card);
        });
        setTimeout(() => { wrapper.scrollLeft = (wrapper.scrollWidth - wrapper.clientWidth) / 2; }, 10);
    }

    let isSpinning = false, animFrame = null;
    function startSpinWithDuration(durationMs) {
        if (isSpinning) return;
        isSpinning = true;
        const startTime = performance.now();
        const startPos = wrapper.scrollLeft;
        const totalWidth = wrapper.scrollWidth - wrapper.clientWidth;
        const fullLoops = 2 + Math.random() * 2;
        const delta = totalWidth * fullLoops + (Math.random() * totalWidth);
        function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
        function step(now) {
            const elapsed = now - startTime;
            let t = Math.min(1, elapsed / durationMs);
            const ease = easeOutCubic(t);
            let newPos = startPos + delta * ease;
            let limited = newPos % totalWidth;
            if (limited < 0) limited += totalWidth;
            wrapper.scrollLeft = limited;
            if (t < 1) animFrame = requestAnimationFrame(step);
            else finish();
        }
        animFrame = requestAnimationFrame(step);
        async function finish() {
            if (animFrame) cancelAnimationFrame(animFrame);
            // Убрана функция ensureNoMythicUnderArrow – теперь mythic может остаться под стрелкой
            let centerCard = getCenterCard();
            let droppedSkin = centerCard ? getSkinFromCard(centerCard) : null;
            // Если скин не определился – берём из новой функции с шансом на mythic
            if (!droppedSkin) {
                droppedSkin = getRandomSkinWithMythicChance();
            } else {
                // Если под стрелкой НЕ mythic – оставляем как есть (это обычный/редкий выпад)
                // Если под стрелкой mythic – он и должен выпасть, это и есть тот самый сверхредкий шанс.
                // Но для полной честности перепроверять не будем, доверяем ленте.
                // Однако если разработчик хочет, чтобы mythic выпадал строго по шансу 1e-8, то нужно игнорировать ленту.
                // Реализуем комбинированный вариант: если выпал mythic в ленте – он выпадает,
                // но также мы дополнительно прогоняем через шанс, чтобы не было "накрутки" визуалом.
                // Следующий код делает так: если в центре mythic, то с вероятностью (MYTHIC_CHANCE / частота mythic в ленте) оставляем,
                // иначе заменяем на случайный non-mythic. Это сложно.
                // Проще: вообще игнорируем ленту и всегда выбираем скин через getRandomSkinWithMythicChance().
                // Так будет точно по заданной вероятности, а лента – просто анимация.
            }
            // Для абсолютной честности используем только вероятностную функцию:
            droppedSkin = getRandomSkinWithMythicChance();
            
            showResultModal(droppedSkin);
            addToInventory(droppedSkin);
            if (!isOwner()) {
                if (selectedReq === 3) openedCase3++;
                else if (selectedReq === 5) openedCase5++;
                else openedCase10++;
            } else {
                if (tg) tg.showAlert("👑 Владелец, кейс открыт бесплатно");
            }
            refreshUI();
            currentDisplayArray = buildDisplayArray(60);
            renderSlot();
            isSpinning = false;
        }
    }

    function showResultModal(skin) {
        const modal = document.getElementById('resultModal');
        document.getElementById('modalImg').src = skin.image;
        document.getElementById('modalSkinText').innerText = skin.name;
        modal.classList.add('active');
        if (tg) tg.HapticFeedback?.notificationOccurred('success');
    }

    function canOpenCase() {
        if (isOwner()) return true;
        let available = 0;
        if (selectedReq === 3) available = Math.floor(userReferrals / 3) - openedCase3;
        else if (selectedReq === 5) available = Math.floor(userReferrals / 5) - openedCase5;
        else available = Math.floor(userReferrals / 10) - openedCase10;
        return available > 0;
    }
    function refreshUI() {
        document.getElementById('referralCount').innerText = userReferrals;
        let totalLeft = isOwner() ? 999 : (Math.floor(userReferrals/3)-openedCase3 + Math.floor(userReferrals/5)-openedCase5 + Math.floor(userReferrals/10)-openedCase10);
        document.getElementById('casesLeft').innerText = isOwner() ? "∞" : totalLeft;
        const btns = [3,5,10].map(req => document.querySelector(`[data-req="${req}"]`));
        btns.forEach((btn, i) => {
            let req = [3,5,10][i];
            let avail = isOwner() || (Math.floor(userReferrals / req) - (req===3?openedCase3:req===5?openedCase5:openedCase10) > 0);
            btn.classList.toggle('disabled', !avail);
        });
        document.querySelectorAll('.case-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-req="${selectedReq}"]`).classList.add('active');
    }
    function setCase(req) {
        if (!isOwner()) {
            let avail = (Math.floor(userReferrals / req) - (req===3?openedCase3:req===5?openedCase5:openedCase10)) > 0;
            if (!avail && userReferrals < req) { if(tg) tg.showAlert(`❌ Нет доступных открытий для кейса ${req}`); return; }
        }
        selectedReq = req;
        refreshUI();
    }
    function attemptOpen(duration) { if(canOpenCase()) startSpinWithDuration(duration); else if(tg) tg.showAlert(`❌ Не хватает рефералов! Нужно ${selectedReq} приглашений.`); }

    function initReferrals() {
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
            let val = parseInt(tg.initDataUnsafe.start_param);
            userReferrals = isNaN(val) ? 0 : val;
        } else userReferrals = isOwner() ? 20 : 2;
        if (!isOwner() && userReferrals === 0) userReferrals = 2;
        refreshUI();
    }

    function switchTab(tab) {
        document.getElementById('casesPanel').style.display = tab === 'cases' ? 'block' : 'none';
        document.getElementById('inventoryPanel').classList.toggle('show', tab === 'inventory');
        document.getElementById('settingsPanel').classList.toggle('show', tab === 'settings');
        if (tab === 'inventory') renderInventory();
    }

    // События
    document.getElementById('slowOpenBtn').onclick = () => attemptOpen(5000);
    document.getElementById('fastOpenBtn').onclick = () => attemptOpen(1200);
    document.querySelectorAll('.case-btn').forEach(btn => btn.onclick = () => setCase(parseInt(btn.getAttribute('data-req'))));
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('resultModal').classList.remove('active');
    document.getElementById('resultModal').onclick = (e) => { if(e.target === document.getElementById('resultModal')) document.getElementById('resultModal').classList.remove('active'); };
    document.getElementById('saveTradeLinkBtn').onclick = saveTradeLink;
    document.getElementById('saveSettingsBtn').onclick = () => { saveSettings(); updateOwnerBadge(); refreshUI(); };
    document.querySelectorAll('.tab-btn').forEach(btn => btn.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        switchTab(btn.getAttribute('data-tab'));
    });

    loadSettings();
    updateOwnerBadge();
    loadUserData();
    currentDisplayArray = buildDisplayArray(60);
    renderSlot();
    initReferrals();
    setCase(3);
    switchTab('cases');
</script>
</body>
</html>
