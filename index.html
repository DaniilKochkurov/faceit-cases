<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Case Battle | Честная рулетка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1f, #03050b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }

        .app {
            max-width: 640px;
            width: 100%;
            background: rgba(6, 10, 24, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 64px;
            padding: 20px 16px 32px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            box-shadow: 0 25px 40px -12px black;
        }

        /* Верхняя панель */
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #01020bc9;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .stat-card {
            background: #00000066;
            border-radius: 40px;
            padding: 5px 18px;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .stat-label { font-size: 13px; color: #9aa5cf; }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #7e9ef5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .owner-badge {
            background: #ffcc44;
            color: #1f1a00;
            font-size: 12px;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: bold;
        }

        /* Кейсы */
        .case-tabs {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-bottom: 28px;
        }
        .case-btn {
            background: #111827;
            border: 1px solid #2a3655;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 15px;
            color: #cbd5ff;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .case-btn.active {
            background: linear-gradient(120deg, #2f4788, #1f3172);
            border-color: #7795ff;
            color: white;
            box-shadow: 0 0 14px #4c7aff;
        }
        .case-btn.disabled {
            opacity: 0.45;
            cursor: not-allowed;
            filter: grayscale(0.2);
        }

        /* Блок рулетки со стрелкой */
        .slot-container {
            position: relative;
            margin: 30px 0 20px;
            background: #03061740;
            border-radius: 48px;
            padding: 20px 12px;
            border: 1px solid #2b3658;
        }
        .track-wrapper {
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
            -ms-overflow-style: none;
            cursor: grab;
            border-radius: 36px;
        }
        .track-wrapper::-webkit-scrollbar {
            display: none;
        }
        .slot-track {
            display: flex;
            flex-wrap: nowrap;
            gap: 18px;
            padding: 12px 8px;
        }
        .slot-card {
            flex: 0 0 auto;
            width: 170px;
            background: #0f1422dd;
            border-radius: 32px;
            padding: 16px 10px;
            text-align: center;
            backdrop-filter: blur(4px);
            transition: 0.1s;
            border: 1px solid rgba(255,210,150,0.2);
        }
        /* Редкость фона */
        .slot-card.common { background: #19213a; }
        .slot-card.rare {
            background: linear-gradient(145deg, #601f1f, #8b2e2e);
            box-shadow: 0 0 14px #ff5e5e;
            border-color: #ff9f7a;
        }
        .slot-card.mythic {
            background: radial-gradient(circle at 30% 20%, #b38f2c, #6b5200);
            box-shadow: 0 0 20px #ffd966;
            border-color: #ffea9e;
        }
        .slot-card img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            filter: drop-shadow(0 8px 12px black);
            border-radius: 20px;
            margin-bottom: 8px;
        }
        .skin-name {
            font-size: 12px;
            font-weight: 600;
            background: #000000aa;
            padding: 5px 8px;
            border-radius: 30px;
            color: white;
        }

        /* СТРЕЛКА (индикатор) */
        .arrow-indicator {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            filter: drop-shadow(0 4px 6px black);
            z-index: 12;
            text-shadow: 0 0 6px cyan;
            pointer-events: none;
        }
        .arrow-indicator span {
            display: block;
            font-size: 52px;
            color: #ffdd77;
            -webkit-text-stroke: 2px #b55a00;
        }
        .center-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 3px;
            background: rgba(255,215,0,0.6);
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 8px gold;
        }

        /* Кнопка открытия */
        .open-btn {
            background: linear-gradient(115deg, #ffb347, #ff6324);
            width: 92%;
            margin: 18px auto 0;
            display: block;
            border: none;
            border-radius: 80px;
            padding: 16px;
            font-size: 26px;
            font-weight: 800;
            color: #1c1f2e;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 6px 18px black;
        }
        .open-btn:active {
            transform: scale(0.97);
        }

        /* Модалка результата */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000dd;
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            z-index: 1000;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-card {
            background: #0f1429f2;
            border-radius: 64px;
            padding: 28px 20px;
            width: 290px;
            text-align: center;
            border: 2px solid goldenrod;
        }
        .modal-card img {
            width: 140px;
            margin: 14px 0;
            border-radius: 24px;
        }
        .modal-close {
            background: #32416b;
            padding: 12px;
            border-radius: 40px;
            margin-top: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="stats">
        <div class="stat-card">
            <span class="stat-label">👥 РЕФЕРАЛЫ</span>
            <span class="stat-value" id="referralCount">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">🎁 ДОСТУПНО</span>
            <span class="stat-value" id="casesLeft">0</span>
        </div>
        <div id="ownerBadge" class="owner-badge" style="display: none;">👑 Владелец</div>
    </div>

    <div class="case-tabs" id="caseTabs">
        <div data-req="3" class="case-btn">🔓 КЕЙС 3</div>
        <div data-req="5" class="case-btn">💎 КЕЙС 5</div>
        <div data-req="10" class="case-btn">🔥 КЕЙС 10</div>
    </div>

    <!-- Рулетка со стрелкой -->
    <div class="slot-container">
        <div class="arrow-indicator"><span>▼</span></div>
        <div class="center-line"></div>
        <div class="track-wrapper" id="trackWrapper">
            <div class="slot-track" id="slotTrack"></div>
        </div>
    </div>

    <button class="open-btn" id="openCaseBtn">🎲 ОТКРЫТЬ КЕЙС</button>
</div>

<div id="resultModal" class="modal">
    <div class="modal-card">
        <h3>✨ ВАМ ВЫПАЛО ✨</h3>
        <img id="modalImg" src="" alt="skin">
        <p id="modalSkinText" style="margin: 10px 0; font-weight: bold;"></p>
        <div class="modal-close" id="closeModalBtn">ЗАКРЫТЬ</div>
    </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<script>
    // ---------- Telegram ----------
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.expand();
        tg.enableClosingConfirmation();
        tg.MainButton.hide();
    }

    // ID владельцев (вы и второй пользователь)
    const OWNER_IDS = [1225488154, 912778066];
    let currentUserId = null;
    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
        currentUserId = tg.initDataUnsafe.user.id;
    } else {
        // Демо-режим для теста в браузере (можно владельцем)
        currentUserId = 1225488154;
    }
    const isOwner = OWNER_IDS.includes(currentUserId);
    if (isOwner) {
        document.getElementById('ownerBadge').style.display = 'inline-block';
    }

    // ---------- БАЗА СКИНОВ (оригиналы) ----------
    const skinLibrary = [
        { name: "M4A4 | Choppa (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Choppa%20(Field-Tested).webp", rarity: "rare" },
        { name: "AK-47 | Olive Polycam (Well-Worn)", image: "https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20Olive%20Polycam%20(Field-Tested).webp", rarity: "rare" },
        { name: "R8 Revolver | Grip (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/R8%20Revolver%20%7C%20Grip%20(Field-Tested).webp", rarity: "rare" },
        { name: "M4A4 | Steel Work (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Steel%20Work%20(Field-Tested).webp", rarity: "common" },
        { name: "SSG 08 | Calligrafaux (Well-Worn)", image: "https://cdn2.csgo.com/item/image/width=916/SSG%2008%20%7C%20Calligrafaux%20(Well-Worn).webp", rarity: "common" },
        { name: "Glock-18 | Ocean Topo (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Ocean%20Topo%20(Field-Tested).webp", rarity: "common" },
        { name: "AK-47 | VariCamo Grey (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20VariCamo%20Grey%20(Field-Tested).webp", rarity: "common" },
        { name: "M4A1-S | Wash me plz (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/M4A1-S%20%7C%20Wash%20me%20plz%20(Field-Tested).webp", rarity: "common" },
        { name: "Glock-18 | Moonrise (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Moonrise%20(Field-Tested).webp", rarity: "mythic" }
    ];

    // Формируем расширенный массив с учётом весов (70% common, 30% rare, mythic исключаем из выпадения)
    function buildWeightedList() {
        let pool = [];
        // исключаем mythic
        const available = skinLibrary.filter(s => s.rarity !== 'mythic');
        for (let s of available) {
            let copies = (s.rarity === 'rare') ? 30 : 70;
            for (let i = 0; i < copies; i++) {
                pool.push({ ...s }); // копия
            }
        }
        // перемешиваем
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        return pool;
    }

    // Для каждого кейса храним отдельный массив (но все они генерируются по одним шансам)
    let case3Pool = [];
    let case5Pool = [];
    let case10Pool = [];

    function refreshPools() {
        case3Pool = buildWeightedList();
        case5Pool = buildWeightedList();
        case10Pool = buildWeightedList();
    }

    // Текущий активный кейс
    let selectedReq = 3; // 3,5,10
    let currentPool = [];

    // Статистика открытий (для обычных игроков)
    let userReferrals = 0;
    let openedCase3 = 0, openedCase5 = 0, openedCase10 = 0;

    // Элементы DOM
    const trackEl = document.getElementById('slotTrack');
    const wrapper = document.getElementById('trackWrapper');

    // Рендер трека на основе текущего пула (8 повторений для бесконечной прокрутки)
    function renderSlot() {
        if (!currentPool.length) refreshPools();
        const pool = currentPool;
        // делаем 6 копий подряд для иллюзии бесконечности
        let repeated = [];
        for (let i = 0; i < 6; i++) {
            repeated.push(...pool);
        }
        trackEl.innerHTML = '';
        repeated.forEach(skin => {
            const card = document.createElement('div');
            card.className = `slot-card ${skin.rarity}`;
            card.innerHTML = `
                <img src="${skin.image}" onerror="this.src='https://placehold.co/120x120?text=Error'">
                <div class="skin-name">${skin.name}</div>
            `;
            trackEl.appendChild(card);
        });
        // Центрируем прокрутку, чтобы стрелка была над каким-то элементом
        setTimeout(() => {
            wrapper.scrollLeft = (wrapper.scrollWidth - wrapper.clientWidth) / 2;
        }, 10);
    }

    // Получить элемент, находящийся точно под стрелкой (по центру вьюпорта)
    function getCenterCard() {
        const containerRect = wrapper.getBoundingClientRect();
        const centerX = containerRect.left + containerRect.width / 2;
        let closestCard = null;
        let minDist = Infinity;
        const cards = document.querySelectorAll('.slot-card');
        for (let card of cards) {
            const rect = card.getBoundingClientRect();
            const cardCenter = rect.left + rect.width / 2;
            const dist = Math.abs(centerX - cardCenter);
            if (dist < minDist) {
                minDist = dist;
                closestCard = card;
            }
        }
        return closestCard;
    }

    // Получить объект скина по карточке (по содержимому)
    function getSkinFromCard(card) {
        if (!card) return null;
        const nameDiv = card.querySelector('.skin-name');
        if (!nameDiv) return null;
        const skinName = nameDiv.innerText;
        // ищем в текущем пуле (оригинальный объект)
        return currentPool.find(s => s.name === skinName) || null;
    }

    // Анимация прокрутки с инерцией (реальное физическое движение)
    let isSpinning = false;
    let animFrame = null;
    function startSpinWithPhysics() {
        if (isSpinning) return;
        isSpinning = true;
        let velocity = 45 + Math.random() * 35; // начальная скорость в px за кадр
        const friction = 0.985;
        let scrollPos = wrapper.scrollLeft;
        const maxScroll = wrapper.scrollWidth - wrapper.clientWidth;
        
        function step() {
            if (!isSpinning) return;
            velocity *= friction;
            scrollPos += velocity;
            if (scrollPos >= maxScroll) {
                scrollPos = scrollPos - maxScroll;
                // небольшая корректировка для зацикливания
            }
            if (scrollPos < 0) scrollPos = 0;
            wrapper.scrollLeft = scrollPos;
            if (Math.abs(velocity) < 0.8) {
                // остановка: определяем выпавший скин и показываем
                finishAndDrop();
                return;
            }
            animFrame = requestAnimationFrame(step);
        }
        step();

        function finishAndDrop() {
            if (animFrame) cancelAnimationFrame(animFrame);
            isSpinning = false;
            // получаем карточку под стрелкой
            const centerCard = getCenterCard();
            if (centerCard) {
                const droppedSkin = getSkinFromCard(centerCard);
                if (droppedSkin) {
                    showResultModal(droppedSkin);
                    // Если не владелец, списываем попытку
                    if (!isOwner) {
                        if (selectedReq === 3) openedCase3++;
                        else if (selectedReq === 5) openedCase5++;
                        else openedCase10++;
                    } else {
                        if (tg) tg.showAlert("👑 Бесплатное открытие (владелец)");
                    }
                    refreshUI();
                    // ОБНОВЛЯЕМ ПУЛ (после открытия кейса желательно перемешать заново для честности)
                    refreshPoolsForCase();
                    renderSlot();
                } else {
                    console.warn("Скин не найден");
                    refreshUI();
                }
            } else {
                refreshUI();
            }
        }
    }

    // Обновить пулы скинов для текущего кейса и пересобрать
    function refreshPoolsForCase() {
        if (selectedReq === 3) currentPool = case3Pool;
        else if (selectedReq === 5) currentPool = case5Pool;
        else currentPool = case10Pool;
        if (currentPool.length === 0) {
            refreshPools();
            if (selectedReq === 3) currentPool = case3Pool;
            else if (selectedReq === 5) currentPool = case5Pool;
            else currentPool = case10Pool;
        }
    }

    // Показать результат
    function showResultModal(skin) {
        const modal = document.getElementById('resultModal');
        document.getElementById('modalImg').src = skin.image;
        document.getElementById('modalSkinText').innerText = skin.name;
        modal.classList.add('active');
        if (tg) tg.HapticFeedback?.notificationOccurred('success');
    }

    // Проверка доступности открытия (для обычных)
    function canOpenCase() {
        if (isOwner) return true;
        let available = 0;
        if (selectedReq === 3) available = Math.floor(userReferrals / 3) - openedCase3;
        else if (selectedReq === 5) available = Math.floor(userReferrals / 5) - openedCase5;
        else available = Math.floor(userReferrals / 10) - openedCase10;
        return available > 0;
    }

    // Обновить все UI: рефералы, оставшиеся кейсы, активность кнопок
    function refreshUI() {
        document.getElementById('referralCount').innerText = userReferrals;
        let totalLeft = 0;
        if (!isOwner) {
            totalLeft += Math.floor(userReferrals / 3) - openedCase3;
            totalLeft += Math.floor(userReferrals / 5) - openedCase5;
            totalLeft += Math.floor(userReferrals / 10) - openedCase10;
        } else {
            totalLeft = 999;
        }
        document.getElementById('casesLeft').innerText = isOwner ? "∞" : totalLeft;
        
        const btn3 = document.querySelector('[data-req="3"]');
        const btn5 = document.querySelector('[data-req="5"]');
        const btn10 = document.querySelector('[data-req="10"]');
        let avail3 = isOwner ? true : (Math.floor(userReferrals / 3) - openedCase3 > 0);
        let avail5 = isOwner ? true : (Math.floor(userReferrals / 5) - openedCase5 > 0);
        let avail10 = isOwner ? true : (Math.floor(userReferrals / 10) - openedCase10 > 0);
        btn3.classList.toggle('disabled', !avail3);
        btn5.classList.toggle('disabled', !avail5);
        btn10.classList.toggle('disabled', !avail10);
        
        // подсветка активного
        document.querySelectorAll('.case-btn').forEach(btn => btn.classList.remove('active'));
        if (selectedReq === 3) btn3.classList.add('active');
        if (selectedReq === 5) btn5.classList.add('active');
        if (selectedReq === 10) btn10.classList.add('active');
    }

    // Сменить кейс
    function setCase(req) {
        if (!isOwner) {
            let avail = false;
            if (req === 3) avail = (Math.floor(userReferrals / 3) - openedCase3 > 0);
            else if (req === 5) avail = (Math.floor(userReferrals / 5) - openedCase5 > 0);
            else avail = (Math.floor(userReferrals / 10) - openedCase10 > 0);
            if (!avail && userReferrals < req) {
                if (tg) tg.showAlert(`❌ У вас нет доступных открытий для кейса ${req}`);
                return;
            }
        }
        selectedReq = req;
        refreshPoolsForCase();
        renderSlot();
        refreshUI();
    }

    // Открыть кейс (запуск прокрутки)
    function attemptOpen() {
        if (!canOpenCase()) {
            if (tg) tg.showAlert(`❌ Недостаточно рефералов! Для кейса ${selectedReq} нужно ${selectedReq} приглашений.`);
            else alert(`Нужно ${selectedReq} рефералов`);
            return;
        }
        startSpinWithPhysics();
    }

    // Инициализация рефералов (из start_param или тест)
    function initReferrals() {
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
            let val = parseInt(tg.initDataUnsafe.start_param);
            userReferrals = isNaN(val) ? 0 : val;
        } else {
            // Демо: если владелец — 20 рефералов, иначе 2
            userReferrals = isOwner ? 20 : 2;
        }
        // для демонстрации обычным юзерам дадим 2 реферала
        if (!isOwner && userReferrals === 0) userReferrals = 2;
        refreshUI();
    }

    // События
    document.getElementById('openCaseBtn').addEventListener('click', attemptOpen);
    document.querySelectorAll('.case-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const req = parseInt(btn.getAttribute('data-req'));
            if (!isNaN(req)) setCase(req);
        });
    });
    document.getElementById('closeModalBtn').addEventListener('click', () => {
        document.getElementById('resultModal').classList.remove('active');
    });
    document.getElementById('resultModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('resultModal')) {
            document.getElementById('resultModal').classList.remove('active');
        }
    });

    // Старт
    refreshPools();
    initReferrals();
    setCase(3);
</script>
</body>
</html>
