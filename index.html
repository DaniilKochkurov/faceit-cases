<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Бомж кейс • Мини-Апп</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1d23;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      color: #fff;
    }
    .app { width: 100%; max-width: 400px; }

    /* Экран выбора кейса */
    .cases-grid { display: flex; flex-direction: column; gap: 16px; }
    .case-card {
      background: linear-gradient(145deg, #1e222a, #171a21);
      border: 2px solid #c9a24d;
      border-radius: 20px;
      padding: 20px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: transform 0.2s;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    }
    .case-card:active { transform: scale(0.97); }
    .case-icon {
      width: 64px; height: 64px;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 30% 30%, #f6c358, #8b691b);
      box-shadow: 0 0 20px rgba(246,195,88,0.5);
      flex-shrink: 0;
    }
    .case-icon img { width: 100%; height: 100%; object-fit: cover; }
    .case-info h3 {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(180deg, #f6c358, #e0911a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .case-info .price-tag { font-size: 14px; color: #a0aab4; margin-top: 4px; }
    .case-info .price-tag span { color: #f6c358; font-weight: 700; }

    /* Экран открытия */
    .open-screen { display: none; flex-direction: column; }
    .back-btn {
      background: none; border: 1px solid #2a2d35; color: #8892a4;
      padding: 8px 14px; border-radius: 20px; font-size: 14px; cursor: pointer;
      margin-bottom: 16px; align-self: flex-start;
    }
    .case-header { text-align: center; margin-bottom: 20px; }
    .case-header h2 {
      font-size: 22px; font-weight: 700; margin-bottom: 4px;
      background: linear-gradient(180deg, #f6c358, #e0911a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .case-header .price { font-size: 14px; color: #a0aab4; }

    /* Лента */
    .roulette-strip-wrapper {
      background: #0e0f14; border-radius: 16px; padding: 16px 0;
      margin-bottom: 20px; border: 1px solid #2a2d35; position: relative;
    }
    .indicator {
      position: absolute; left: 50%; transform: translateX(-50%); z-index: 10;
      width: 0; height: 0;
    }
    .indicator-top {
      top: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 12px solid #f6c358;
    }
    .indicator-bottom {
      bottom: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 12px solid #f6c358;
    }
    .strip-viewport { width: 100%; overflow: hidden; position: relative; }
    .strip-track {
      display: flex;
      transition: transform 0.1s cubic-bezier(0.25, 0.1, 0.25, 1);
      will-change: transform;
    }
    .skin-item {
      flex: 0 0 130px; height: 110px; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      margin: 0 8px; border-radius: 12px; position: relative;
    }
    .skin-item img {
      max-width: 80%; max-height: 70%; object-fit: contain;
      filter: drop-shadow(0 4px 10px black);
    }
    .skin-item .name { font-size: 11px; margin-top: 6px; text-align: center; color: #ddd; }
    .bg-cheap { background: transparent; }
    .bg-expensive { background: radial-gradient(circle, #e74c3c44 0%, #e74c3c11 70%, transparent 100%); }
    .bg-impossible { background: radial-gradient(circle, #f1c40f44 0%, #f1c40f11 70%, transparent 100%); }

    /* Кнопки */
    .buttons-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .btn {
      flex: 1; border: none; font-weight: 700; font-size: 16px;
      padding: 14px 0; border-radius: 50px; cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .btn-open {
      background: linear-gradient(180deg, #f6c358, #d4941a);
      color: #1a1d23;
      box-shadow: 0 6px 20px rgba(201,162,77,0.3);
    }
    .btn-fast {
      background: transparent; border: 2px solid #c9a24d; color: #c9a24d;
    }

    /* Содержимое */
    .case-contents {
      background: #14171e; border-radius: 16px; padding: 16px;
      border: 1px solid #2a2d35;
    }
    .case-contents h4 { font-size: 14px; color: #8892a4; margin-bottom: 12px; }
    .content-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid #1e222a;
    }
    .content-row:last-child { border-bottom: none; }
    .content-skin { display: flex; align-items: center; gap: 8px; }
    .content-skin img { width: 36px; height: 36px; object-fit: contain; }
    .content-skin span { font-size: 13px; color: #d0d0d0; }
    .content-chance { font-size: 12px; color: #8892a4; }
    .status-msg { text-align: center; margin-top: 16px; font-size: 14px; color: #f6c358; }
  </style>
</head>
<body>
<div class="app">
  <!-- ЭКРАН ВЫБОРА КЕЙСА -->
  <div id="casesScreen">
    <div class="case-card" data-case="1">
      <div class="case-icon">
        <!-- Заменил на прямую ссылку, чтобы точно грузилось -->
        <img src="https://i.ytimg.com/vi/vEnOnKZR1pM/maxresdefault.jpg" alt="Бомж кейс" crossorigin="anonymous">
      </div>
      <div class="case-info">
        <h3>Бомж кейс</h3>
        <div class="price-tag">Стоимость: <span>3 реферала</span></div>
      </div>
    </div>
  </div>

  <!-- ЭКРАН ОТКРЫТИЯ -->
  <div id="openScreen" class="open-screen">
    <button class="back-btn" id="backBtn">← Назад</button>
    <div class="case-header">
      <h2>Бомж кейс</h2>
      <div class="price">Открытие за 3 реферала</div>
    </div>

    <div class="roulette-strip-wrapper">
      <div class="indicator indicator-top"></div>
      <div class="indicator indicator-bottom"></div>
      <div class="strip-viewport" id="viewport">
        <div class="strip-track" id="stripTrack"></div>
      </div>
    </div>

    <div class="buttons-row">
      <button class="btn btn-open" id="btnOpen">🔓 Открыть</button>
      <button class="btn btn-fast" id="btnFast">⚡ Быстро</button>
    </div>

    <div class="case-contents" id="caseContents"></div>
    <div class="status-msg" id="statusMsg"></div>
  </div>
</div>

<script>
  // Конфиг скинов
  const skins = [
    { name: 'M4A4 | Choppa (FT)', price: '~9.5 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Choppa%20(Field-Tested).webp', rarity: 'expensive', chance: 3 },
    { name: 'AK-47 | Olive Polycam (WW)', price: '~8.7 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20Olive%20Polycam%20(Field-Tested).webp', rarity: 'expensive', chance: 3 },
    { name: 'R8 Revolver | Grip (FT)', price: '~7.2 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/R8%20Revolver%20%7C%20Grip%20(Field-Tested).webp', rarity: 'expensive', chance: 3 },
    { name: 'M4A4 | Steel Work (FT)', price: '~0.8 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Steel%20Work%20(Field-Tested).webp', rarity: 'cheap', chance: 18 },
    { name: 'SSG 08 | Calligrafaux (WW)', price: '~1.1 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/SSG%2008%20%7C%20Calligrafaux%20(Well-Worn).webp', rarity: 'cheap', chance: 18 },
    { name: 'Glock-18 | Ocean Topo (FT)', price: '~0.6 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Ocean%20Topo%20(Field-Tested).webp', rarity: 'cheap', chance: 18 },
    { name: 'AK-47 | VariCamo Grey (FT)', price: '~1.5 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20VariCamo%20Grey%20(Field-Tested).webp', rarity: 'cheap', chance: 18 },
    { name: 'M4A1-S | Wash me plz (FT)', price: '~0.9 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/M4A1-S%20%7C%20Wash%20me%20plz%20(Field-Tested).webp', rarity: 'cheap', chance: 18 },
    { name: 'Glock-18 | Moonrise (FT)', price: '~98 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Moonrise%20(Field-Tested).webp', rarity: 'impossible', chance: 1 }
  ];

  // Пул розыгрыша (без невозможного)
  const pool = [];
  skins.forEach(s => {
    if (s.rarity !== 'impossible') {
      for (let i = 0; i < s.chance; i++) pool.push(s);
    }
  });

  const casesScreen = document.getElementById('casesScreen');
  const openScreen  = document.getElementById('openScreen');
  const backBtn     = document.getElementById('backBtn');
  const stripTrack  = document.getElementById('stripTrack');
  const btnOpen     = document.getElementById('btnOpen');
  const btnFast     = document.getElementById('btnFast');
  const caseContents= document.getElementById('caseContents');
  const statusMsg   = document.getElementById('statusMsg');

  let isRolling = false;

  // Построение ленты и списка
  function buildStripAndContents() {
    stripTrack.innerHTML = '';
    // Увеличиваем повтор, чтобы лента была длиннее и прокручивалось много скинов
    const repeatTimes = 20; // было 6, стало 8 – больше элементов, выше скорость визуально
    for (let r = 0; r < repeatTimes; r++) {
      skins.forEach(skin => {
        const div = document.createElement('div');
        div.className = `skin-item bg-${skin.rarity}`;
        div.innerHTML = `<img src="${skin.img}" alt="${skin.name}"><div class="name">${skin.name.split(' (')[0]}</div>`;
        stripTrack.appendChild(div);
      });
    }

    caseContents.innerHTML = '<h4>📦 Содержимое кейса</h4>';
    skins.forEach(skin => {
      const row = document.createElement('div');
      row.className = 'content-row';
      row.innerHTML = `
        <div class="content-skin">
          <img src="${skin.img}" alt="${skin.name}">
          <span>${skin.name}</span>
        </div>
        <div class="content-chance">${skin.chance}%</div>
      `;
      caseContents.appendChild(row);
    });
  }

  function openCase() {
    buildStripAndContents();
    casesScreen.style.display = 'none';
    openScreen.style.display = 'flex';
    stripTrack.style.transition = 'none';
    stripTrack.style.transform = 'translateX(0)';
    statusMsg.textContent = '';
  }

  function goBack() {
    openScreen.style.display = 'none';
    casesScreen.style.display = 'flex';
  }

  function getRandomSkin() {
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function roll(finalSkin, speedMode = 'normal') {
    const itemWidth = 138; // 130px + margin
    const totalItems = stripTrack.children.length;
    // Ищем индекс финального скина в ленте
    let finalIndex = -1;
    const targetName = finalSkin.name.split(' (')[0];
    for (let i = 0; i < totalItems; i++) {
      const nameEl = stripTrack.children[i].querySelector('.name');
      if (nameEl && nameEl.textContent === targetName) {
        finalIndex = i;
        break;
      }
    }
    // Если по какой-то причине не нашли, берём последний подходящий
    if (finalIndex === -1) {
      for (let i = totalItems - 1; i >= 0; i--) {
        const nameEl = stripTrack.children[i].querySelector('.name');
        if (nameEl && nameEl.textContent === targetName) {
          finalIndex = i;
          break;
        }
      }
    }
    if (finalIndex === -1) finalIndex = 0;

    // Делаем так, чтобы финальный скин оказался под указателем
    const viewportWidth = document.getElementById('viewport').clientWidth;
    const startTrans = -finalIndex * itemWidth + viewportWidth / 2 - itemWidth / 2;
    const duration = speedMode === 'fast' ? 2500 : 7000;

    const startTime = performance.now();
    const initialTransform = 0;

    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3); // плавное замедление
      const currentOffset = initialTransform + (startTrans - initialTransform) * ease;
      stripTrack.style.transform = `translateX(${currentOffset}px)`;

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        finishRoll(finalSkin);
      }
    }

    requestAnimationFrame(animate);
  }

  function finishRoll(skin) {
    isRolling = false;
    btnOpen.disabled = false;
    btnFast.disabled = false;
    if (skin.rarity === 'impossible') {
      statusMsg.innerHTML = `🔥 НЕВЕРОЯТНО! Выпал ${skin.name} (${skin.price})`;
    } else {
      statusMsg.innerHTML = `🎉 Выпал: ${skin.name} (${skin.price})`;
    }
  }

  function startOpen(speed = 'normal') {
    if (isRolling) return;
    isRolling = true;
    btnOpen.disabled = true;
    btnFast.disabled = true;
    statusMsg.textContent = speed === 'fast' ? 'Быстрое открытие...' : 'Крутим...';
    const final = getRandomSkin();
    roll(final, speed);
  }

  document.querySelectorAll('.case-card').forEach(card => {
    card.addEventListener('click', openCase);
  });

  backBtn.addEventListener('click', goBack);
  btnOpen.addEventListener('click', () => startOpen('normal'));
  btnFast.addEventListener('click', () => startOpen('fast'));

  casesScreen.style.display = 'flex';
  openScreen.style.display = 'none';
</script>
</body>
</html>
