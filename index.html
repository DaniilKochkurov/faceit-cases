<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Case Battle | Реферальные кейсы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0b0f1c, #05070f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }

        /* Главный контейнер */
        .app {
            max-width: 560px;
            width: 100%;
            background: rgba(8, 12, 26, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            padding: 20px 18px 30px;
            border: 1px solid rgba(72, 120, 255, 0.25);
            box-shadow: 0 20px 35px -10px black;
        }

        /* Верхняя панель */
        .stats {
            display: flex;
            justify-content: space-between;
            background: #01020ad9;
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 24px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #00000055;
            border-radius: 40px;
            padding: 6px 18px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-weight: 600;
        }

        .stat-label {
            font-size: 13px;
            color: #9aa4bf;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #7aa2f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .owner-badge {
            background: #ffcc44;
            color: #1f1a00;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: bold;
        }

        /* Выбор кейса */
        .case-tabs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .case-btn {
            background: #12182b;
            border: 1px solid #2e3a55;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 15px;
            color: #cbd5ff;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .case-btn.active {
            background: linear-gradient(120deg, #2b4275, #1d2e54);
            border-color: #5f8eff;
            color: white;
            box-shadow: 0 0 12px #3f6eff;
        }

        .case-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.2);
        }

        /* Горизонтальная рулетка (слот) */
        .slot-machine {
            background: #03061770;
            border-radius: 48px;
            padding: 24px 12px;
            margin: 20px 0;
            overflow: hidden;
            position: relative;
            border: 1px solid #2a345b;
        }

        .slot-track {
            display: flex;
            flex-wrap: nowrap;
            gap: 16px;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;
            cursor: grab;
            transition: transform 0.1s linear;
            padding: 8px 4px;
        }

        .slot-track::-webkit-scrollbar {
            display: none;
        }

        .slot-card {
            flex: 0 0 auto;
            width: 160px;
            background: #0f1422dd;
            border-radius: 28px;
            padding: 12px 8px;
            text-align: center;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            border: 1px solid rgba(255,255,200,0.1);
        }

        /* Редкость задаётся фоном */
        .slot-card.common {
            background: #17202e;
        }
        .slot-card.rare {
            background: linear-gradient(145deg, #511c1c, #752525);
            box-shadow: 0 0 12px #ff4d4d80;
            border-color: #ff7e5e;
        }
        .slot-card.mythic {
            background: radial-gradient(circle at 30% 20%, #aa8c2c, #5a4900);
            box-shadow: 0 0 18px #ffcc33;
            border-color: #ffdd77;
        }

        .slot-card img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 8px 12px black);
            border-radius: 20px;
            margin-bottom: 8px;
        }

        .slot-card .skin-name {
            font-size: 12px;
            font-weight: 600;
            background: #000000aa;
            padding: 4px 8px;
            border-radius: 30px;
            color: white;
            white-space: normal;
            word-break: break-word;
        }

        /* Кнопка открытия */
        .open-btn {
            background: linear-gradient(105deg, #f5a742, #ff5e2e);
            width: 90%;
            margin: 20px auto 0;
            display: block;
            border: none;
            border-radius: 80px;
            padding: 16px;
            font-size: 24px;
            font-weight: 800;
            color: #1a1f2b;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 8px 18px black;
        }

        .open-btn:active {
            transform: scale(0.97);
        }

        /* Модалка выпадения */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000dd;
            backdrop-filter: blur(18px);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            z-index: 1000;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: #101422f2;
            border-radius: 64px;
            padding: 28px 20px;
            width: 280px;
            text-align: center;
            border: 1px solid gold;
        }

        .modal-content img {
            width: 130px;
            margin: 12px 0;
            border-radius: 24px;
        }

        .modal-close {
            background: #2a3855;
            padding: 10px;
            border-radius: 40px;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="stats">
        <div class="stat-card">
            <span class="stat-label">👥 РЕФЕРАЛЫ</span>
            <span class="stat-value" id="referralCount">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">🎁 ДОСТУПНО</span>
            <span class="stat-value" id="casesLeft">0</span>
        </div>
        <div id="ownerBadge" class="owner-badge" style="display: none;">👑 Владелец</div>
    </div>

    <div class="case-tabs" id="caseTabs">
        <div data-req="3" class="case-btn">🔓 КЕЙС 3</div>
        <div data-req="5" class="case-btn">💎 КЕЙС 5</div>
        <div data-req="10" class="case-btn">🔥 КЕЙС 10</div>
    </div>

    <!-- Горизонтальный слайдер (рулетка) -->
    <div class="slot-machine">
        <div class="slot-track" id="slotTrack"></div>
    </div>

    <button class="open-btn" id="openCaseBtn">🎲 ОТКРЫТЬ КЕЙС</button>
</div>

<div id="resultModal" class="modal">
    <div class="modal-content">
        <h3>✨ ВЫПАЛО ✨</h3>
        <img id="modalSkinImg" src="" alt="skin">
        <p id="modalSkinName" style="margin: 10px 0; font-weight: bold;"></p>
        <div class="modal-close" id="closeModalBtn">ЗАКРЫТЬ</div>
    </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<script>
    // ИНИЦИАЛИЗАЦИЯ TELEGRAM
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.expand();
        tg.enableClosingConfirmation();
        tg.MainButton.hide();
    }

    // ID ВЛАДЕЛЬЦА (вы)
    const OWNER_ID = 1225488154;
    let currentUserId = null;

    // ПОЛУЧАЕМ ID ПОЛЬЗОВАТЕЛЯ ИЗ TELEGRAM
    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
        currentUserId = tg.initDataUnsafe.user.id;
    } else {
        // ДЕМО-режим: для теста в браузере
        currentUserId = 1225488154;  // для удобства теста за владельца
    }
    const isOwner = (currentUserId === OWNER_ID);
    if (isOwner) {
        document.getElementById('ownerBadge').style.display = 'inline-block';
    }

    // -------- ДАННЫЕ СКИНОВ ДЛЯ КАЖДОГО КЕЙСА (одинаковый набор) --------
    const skinDatabase = [
        { name: "M4A4 | Choppa (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Choppa%20(Field-Tested).webp", rarity: "rare" },
        { name: "AK-47 | Olive Polycam (Well-Worn)", image: "https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20Olive%20Polycam%20(Field-Tested).webp", rarity: "rare" },
        { name: "R8 Revolver | Grip (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/R8%20Revolver%20%7C%20Grip%20(Field-Tested).webp", rarity: "rare" },
        { name: "M4A4 | Steel Work (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Steel%20Work%20(Field-Tested).webp", rarity: "common" },
        { name: "SSG 08 | Calligrafaux (Well-Worn)", image: "https://cdn2.csgo.com/item/image/width=916/SSG%2008%20%7C%20Calligrafaux%20(Well-Worn).webp", rarity: "common" },
        { name: "Glock-18 | Ocean Topo (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Ocean%20Topo%20(Field-Tested).webp", rarity: "common" },
        { name: "AK-47 | VariCamo Grey (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20VariCamo%20Grey%20(Field-Tested).webp", rarity: "common" },
        { name: "M4A1-S | Wash me plz (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/M4A1-S%20%7C%20Wash%20me%20plz%20(Field-Tested).webp", rarity: "common" },
        { name: "Glock-18 | Moonrise (Field-Tested)", image: "https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Moonrise%20(Field-Tested).webp", rarity: "mythic" }   // никогда не выпадает
    ];

    // Копируем для каждого кейса (набор одинаков)
    const case3Items = [...skinDatabase];
    const case5Items = [...skinDatabase];
    const case10Items = [...skinDatabase];

    // -------- ЛОГИКА ВЫПАДЕНИЯ (обычные 70%, редкие 30%, mythic исключён) ---------
    function getRandomDrop(itemsArray) {
        const possible = itemsArray.filter(skin => skin.rarity !== 'mythic');
        if (possible.length === 0) return itemsArray[0];
        let total = 0;
        const weights = possible.map(skin => {
            let w = (skin.rarity === 'rare') ? 30 : 70;
            total += w;
            return { skin, w };
        });
        let rand = Math.random() * total;
        let acc = 0;
        for (let item of weights) {
            acc += item.w;
            if (rand <= acc) return item.skin;
        }
        return possible[0];
    }

    // ------ СОСТОЯНИЕ ПОЛЬЗОВАТЕЛЯ ------
    let userReferrals = 0;          // будет получено из start_param / бэкенда
    let openedCase3 = 0;
    let openedCase5 = 0;
    let openedCase10 = 0;

    // Выбранный кейс
    let selectedReq = 3;   // 3,5,10
    let currentCaseItems = case3Items;

    // Функция: сколько раз можно открыть выбранный кейс (для обычного игрока)
    function getAvailableOpens(req) {
        if (isOwner) return 999;    // владелец может безлимит
        let totalAvailable = 0;
        if (req === 3) totalAvailable = Math.floor(userReferrals / 3) - openedCase3;
        else if (req === 5) totalAvailable = Math.floor(userReferrals / 5) - openedCase5;
        else if (req === 10) totalAvailable = Math.floor(userReferrals / 10) - openedCase10;
        return totalAvailable > 0 ? totalAvailable : 0;
    }

    // Обновить UI (цифры, активность кнопок кейсов)
    function refreshUI() {
        document.getElementById('referralCount').innerText = userReferrals;
        // Общее количество доступных открытий по всем кейсам (для красоты)
        let totalOpens = 0;
        totalOpens += Math.floor(userReferrals / 3) - openedCase3;
        totalOpens += Math.floor(userReferrals / 5) - openedCase5;
        totalOpens += Math.floor(userReferrals / 10) - openedCase10;
        if (isOwner) totalOpens = 999;
        document.getElementById('casesLeft').innerText = isOwner ? "∞" : totalOpens;

        // Стили кнопок выбора кейса
        const btn3 = document.querySelector('[data-req="3"]');
        const btn5 = document.querySelector('[data-req="5"]');
        const btn10 = document.querySelector('[data-req="10"]');
        
        const avail3 = (isOwner) ? true : (Math.floor(userReferrals / 3) - openedCase3 > 0);
        const avail5 = (isOwner) ? true : (Math.floor(userReferrals / 5) - openedCase5 > 0);
        const avail10 = (isOwner) ? true : (Math.floor(userReferrals / 10) - openedCase10 > 0);
        
        btn3.classList.toggle('disabled', !avail3);
        btn5.classList.toggle('disabled', !avail5);
        btn10.classList.toggle('disabled', !avail10);
        
        // Активный кейс
        document.querySelectorAll('.case-btn').forEach(btn => btn.classList.remove('active'));
        if (selectedReq === 3) btn3.classList.add('active');
        if (selectedReq === 5) btn5.classList.add('active');
        if (selectedReq === 10) btn10.classList.add('active');
    }

    // ----- ГОРИЗОНТАЛЬНАЯ РУЛЕТКА (прокрутка + остановка) -----
    let isSpinning = false;
    let spinInterval = null;
    let spinVelocity = 0;
    let trackElement = document.getElementById('slotTrack');
    
    // формируем список карточек (8 копий оригинальных скинов для бесконечности)
    function buildSlotList() {
        const items = currentCaseItems;
        // Создаем 5 повторений массива, чтобы прокрутка была бесконечной
        let repeated = [];
        for (let i = 0; i < 6; i++) {
            repeated.push(...items);
        }
        trackElement.innerHTML = '';
        repeated.forEach(skin => {
            const card = document.createElement('div');
            card.className = 'slot-card ' + skin.rarity;
            card.innerHTML = `
                <img src="${skin.image}" onerror="this.src='https://placehold.co/120x120?text=Error'">
                <div class="skin-name">${skin.name}</div>
            `;
            trackElement.appendChild(card);
        });
        // Прокручиваем в середину (чтобы было откуда стартовать)
        trackElement.scrollLeft = (trackElement.scrollWidth - trackElement.clientWidth) / 2;
    }

    // плавная прокрутка с эффектом торможения
    function startSpin() {
        if (isSpinning) return;
        isSpinning = true;
        let scrollStep = 0;
        const maxScroll = trackElement.scrollWidth - trackElement.clientWidth;
        let velocity = 32; // начальная скорость
        const friction = 0.98;
        let animationId = null;
        
        function step() {
            if (!isSpinning) return;
            velocity *= friction;
            scrollStep += velocity;
            if (scrollStep > maxScroll) scrollStep = scrollStep % maxScroll;
            if (scrollStep < 0) scrollStep = 0;
            trackElement.scrollLeft = scrollStep;
            
            if (Math.abs(velocity) < 0.5 && velocity < 0.5) {
                // анимация завершена — определяем центральный элемент и делаем реальный дроп
                finishSpinAndDrop();
                return;
            }
            animationId = requestAnimationFrame(step);
        }
        
        // случайный импульс скорости
        velocity = Math.random() * 60 + 35;
        scrollStep = trackElement.scrollLeft;
        step();
        
        async function finishSpinAndDrop() {
            if (animationId) cancelAnimationFrame(animationId);
            isSpinning = false;
            // Определяем, какой элемент попал в центр вьюпорта
            const containerRect = trackElement.getBoundingClientRect();
            const centerX = containerRect.left + containerRect.width / 2;
            let closestCard = null;
            let closestDistance = Infinity;
            const cards = document.querySelectorAll('.slot-card');
            for (let card of cards) {
                const rect = card.getBoundingClientRect();
                const cardCenter = rect.left + rect.width / 2;
                const dist = Math.abs(centerX - cardCenter);
                if (dist < closestDistance) {
                    closestDistance = dist;
                    closestCard = card;
                }
            }
            // Убираем визуальное выделение
            // Теперь ВЫБИРАЕМ НАСТОЯЩИЙ ДРОП по вероятностям
            const droppedSkin = getRandomDrop(currentCaseItems);
            // Показываем модалку с результатом
            showResult(droppedSkin);
            
            // Если не владелец, то списываем открытие
            if (!isOwner) {
                if (selectedReq === 3) openedCase3++;
                else if (selectedReq === 5) openedCase5++;
                else if (selectedReq === 10) openedCase10++;
            } else {
                // для владельца не списываем, но и не накапливаем лимиты
                if (tg) tg.showAlert("👑 Вы открыли кейс как владелец (без траты рефералов)");
            }
            refreshUI();
            // пересобираем рулетку (чтобы синхронизировать)
            buildSlotList();
        }
    }
    
    function showResult(skin) {
        const modal = document.getElementById('resultModal');
        const modalImg = document.getElementById('modalSkinImg');
        const modalName = document.getElementById('modalSkinName');
        modalImg.src = skin.image;
        modalName.innerText = skin.name;
        modal.classList.add('active');
        if (tg) tg.HapticFeedback?.notificationOccurred('success');
    }
    
    // Открыть кейс (проверка возможности)
    function attemptOpenCase() {
        const available = getAvailableOpens(selectedReq);
        if (!isOwner && available <= 0) {
            if (tg) tg.showAlert(`❌ Недостаточно рефералов для кейса ${selectedReq}!\nНужно ${selectedReq} приглашений.`);
            else alert(`Нужно ${selectedReq} рефералов!`);
            return;
        }
        // Запускаем прокрутку
        startSpin();
    }
    
    // Смена активного кейса
    function setCase(req) {
        selectedReq = req;
        if (req === 3) currentCaseItems = case3Items;
        else if (req === 5) currentCaseItems = case5Items;
        else currentCaseItems = case10Items;
        buildSlotList();
        refreshUI();
    }
    
    // --- ПОЛУЧЕНИЕ РЕФЕРАЛОВ ИЗ TELEGRAM (start_param) ---
    function initReferrals() {
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
            let refVal = parseInt(tg.initDataUnsafe.start_param);
            if (!isNaN(refVal) && refVal > 0) userReferrals = refVal;
            else userReferrals = 0;
        } else {
            // Демо: для теста владельцу дадим 10 рефералов
            userReferrals = isOwner ? 10 : 2;
        }
        // Для демонстрации: если обычный пользователь, то 2 реферала
        if (!isOwner && userReferrals === 0) userReferrals = 2;
        refreshUI();
    }
    
    // ---- СОБЫТИЯ ----
    document.getElementById('openCaseBtn').addEventListener('click', attemptOpenCase);
    document.querySelectorAll('.case-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const req = parseInt(btn.getAttribute('data-req'));
            if (!isNaN(req)) setCase(req);
        });
    });
    document.getElementById('closeModalBtn').addEventListener('click', () => {
        document.getElementById('resultModal').classList.remove('active');
    });
    document.getElementById('resultModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('resultModal')) {
            document.getElementById('resultModal').classList.remove('active');
        }
    });
    
    // Запуск
    initReferrals();
    setCase(3);
</script>
</body>
</html>
