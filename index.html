<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faceit Cases</title>

<style>
body {
    font-family: Arial;
    background: #1a1a2e;
    color: white;
    text-align: center;
}

.case {
    background: #16213e;
    border-radius: 15px;
    padding: 20px;
    margin: 10px;
    cursor: pointer;
}

#animationOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
}

#resultContainer {
    margin-top: 50px;
}

button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>🎁 Открой кейс</h2>
<div id="casesContainer"></div>

<div id="animationOverlay">
    <div id="resultContainer">
        <div id="resultSkin"></div>
        <input id="tradeUrlInput" placeholder="Трейд ссылка">
        <br><br>
        <button id="withdrawBtn">Вывести</button>
    </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let currentWinItem = null;

// ===== UI =====
const container = document.getElementById('casesContainer');
const overlay = document.getElementById('animationOverlay');
const resultSkin = document.getElementById('resultSkin');
const tradeInput = document.getElementById('tradeUrlInput');
const withdrawBtn = document.getElementById('withdrawBtn');

// ===== КЕЙС =====
const cases = [
    {
        name: "Обычный",
        items: [
            "AK-47",
            "M4A1-S",
            "Glock-18",
            "AWP"
        ]
    }
];

// ===== РЕНДЕР =====
cases.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'case';
    div.innerText = c.name;
    div.onclick = () => openCase(i);
    container.appendChild(div);
});

// ===== ОТКРЫТИЕ =====
function openCase(index) {
    const c = cases[index];

    const win = c.items[Math.floor(Math.random() * c.items.length)];

    overlay.style.display = 'block';

    setTimeout(() => {
        currentWinItem = win;
        resultSkin.innerHTML = "Выпало: <b>" + win + "</b>";
        console.log("🎯 Выпало:", win);
    }, 1000);
}

// ===== КНОПКА ВЫВОДА =====
withdrawBtn.onclick = () => {
    console.log("👉 нажали вывод");

    if (!currentWinItem) {
        alert("Сначала открой кейс");
        return;
    }

    const link = tradeInput.value.trim();

    if (!link) {
        alert("Вставь трейд ссылку");
        return;
    }

    const payload = {
        skin: currentWinItem,
        trade_link: link
    };

    console.log("📤 отправка:", payload);

    tg.sendData(JSON.stringify(payload));

    alert("Отправлено!");

    overlay.style.display = 'none';
};
</script>

</body>
</html>
