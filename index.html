<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Бомж Кейсы • BPF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1d23;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
      color: #fff;
    }
    .app { width: 100%; max-width: 420px; }

    /* Вкладки */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 16px;
      background: #0e0f14; border-radius: 12px; padding: 4px;
    }
    .tab {
      flex: 1; background: transparent; border: none; color: #8892a4;
      font-weight: 600; padding: 10px 4px; border-radius: 10px; cursor: pointer;
      font-size: 12px; transition: 0.2s;
    }
    .tab.active { background: #c9a24d; color: #1a1d23; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Выбор кейса (три карточки) */
    .case-selector {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .case-option {
      flex: 1; background: #1e222a; border: 2px solid #2a2d35;
      border-radius: 16px; padding: 12px 8px; text-align: center;
      cursor: pointer; transition: 0.2s;
    }
    .case-option.active {
      border-color: #c9a24d;
      box-shadow: 0 0 15px rgba(201,162,77,0.3);
    }
    .case-option img {
      width: 100%; height: 70px; object-fit: contain; border-radius: 8px;
      margin-bottom: 6px;
    }
    .case-option .cname {
      font-size: 12px; font-weight: 700;
      background: linear-gradient(180deg, #f6c358, #e0911a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .case-option .crefs {
      font-size: 10px; color: #8892a4; margin-top: 2px;
    }

    /* Карточка кейса и рулетка */
    .case-card {
      background: linear-gradient(145deg, #1e222a, #171a21);
      border: 2px solid #c9a24d;
      border-radius: 20px; padding: 16px; text-align: center;
      margin-bottom: 16px;
      box-shadow: 0 0 30px rgba(201,162,77,0.15);
    }
    .case-card img {
      width: 100%; max-height: 140px; object-fit: contain;
      border-radius: 12px; margin-bottom: 10px;
    }
    .case-card h2 {
      font-size: 20px; font-weight: 700;
      background: linear-gradient(180deg, #f6c358, #e0911a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .case-card .price {
      font-size: 14px; color: #a0aab4; margin-top: 6px;
    }

    .roulette-wrap {
      background: #0e0f14; border-radius: 16px; padding: 16px 0;
      margin-bottom: 20px; border: 1px solid #2a2d35; position: relative;
    }
    .indicator {
      position: absolute; left: 50%; transform: translateX(-50%); z-index: 10;
      width: 0; height: 0;
    }
    .indicator-top {
      top: -2px;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 12px solid #f6c358;
    }
    .indicator-bottom {
      bottom: -2px;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 12px solid #f6c358;
    }
    .viewport { width: 100%; overflow: hidden; position: relative; }
    .strip-track { display: flex; will-change: transform; }
    .skin-item {
      flex: 0 0 130px; height: 110px; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      margin: 0 8px; border-radius: 12px; position: relative;
    }
    .skin-item img {
      max-width: 80%; max-height: 70%; object-fit: contain;
      filter: drop-shadow(0 4px 10px black);
    }
    .skin-item .name { font-size: 11px; margin-top: 6px; text-align: center; color: #ddd; }
    .bg-cheap { background: transparent; }
    .bg-expensive { background: radial-gradient(circle, #e74c3c44 0%, #e74c3c11 70%, transparent 100%); }
    .bg-impossible { background: radial-gradient(circle, #f1c40f44 0%, #f1c40f11 70%, transparent 100%); }

    .btns-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .btn {
      flex: 1; border: none; font-weight: 700; font-size: 16px;
      padding: 14px 0; border-radius: 50px; cursor: pointer;
      transition: 0.1s;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    .btn-open {
      background: linear-gradient(180deg, #f6c358, #d4941a);
      color: #1a1d23;
      box-shadow: 0 6px 20px rgba(201,162,77,0.4);
    }
    .btn-fast {
      background: transparent; border: 2px solid #c9a24d;
      color: #c9a24d;
    }

    .contents-box {
      background: #14171e; border-radius: 16px; padding: 16px;
      border: 1px solid #2a2d35; margin-bottom: 16px;
    }
    .contents-box h4 { font-size: 14px; color: #8892a4; margin-bottom: 12px; }
    .content-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid #1e222a;
    }
    .content-row:last-child { border-bottom: none; }
    .content-skin { display: flex; align-items: center; gap: 8px; }
    .content-skin img { width: 36px; height: 36px; object-fit: contain; }
    .content-skin span { font-size: 13px; color: #d0d0d0; }
    .content-chance { font-size: 12px; color: #8892a4; }

    /* Инвентарь / История */
    .skin-list { display: flex; flex-direction: column; gap: 12px; }
    .skin-card {
      display: flex; align-items: center; gap: 12px;
      background: #1e222a; padding: 12px; border-radius: 12px;
    }
    .skin-card img { width: 60px; height: 60px; object-fit: contain; }
    .skin-info { flex: 1; }
    .skin-info .skin-name { font-weight: 600; }
    .skin-info .skin-price { color: #8892a4; font-size: 13px; }
    .withdraw-btn {
      background: #c9a24d; border: none; color: #1a1d23;
      font-weight: 700; padding: 8px 16px; border-radius: 20px; cursor: pointer;
    }

    /* Профиль */
    .profile-box {
      background: #1e222a; border-radius: 16px; padding: 20px;
    }
    .input-field {
      width: 100%; padding: 12px; background: #0e0f14;
      border: 1px solid #2a2d35; border-radius: 8px; color: #fff;
      margin-bottom: 12px; font-size: 14px;
    }
    .save-btn {
      background: linear-gradient(180deg, #f6c358, #d4941a);
      border: none; padding: 12px; width: 100%; border-radius: 8px;
      font-weight: 700; color: #1a1d23; cursor: pointer;
    }

    /* Модальное окно */
    .popup {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); display: none;
      justify-content: center; align-items: center; z-index: 1000;
    }
    .popup-card {
      background: #1e222a; border: 2px solid #c9a24d;
      border-radius: 20px; padding: 24px; text-align: center;
      max-width: 300px; width: 90%;
    }
    .popup-card img { max-width: 150px; max-height: 120px; }
    .popup-card h3 { margin: 12px 0 4px; }
    .popup-card .pprice { color: #c9a24d; font-weight: 700; margin-bottom: 16px; }
    .status-msg { text-align: center; color: #c9a24d; margin-top: 8px; }
  </style>
</head>
<body>
<div class="app">
  <div class="tabs">
    <button class="tab active" data-tab="case">🎁 Кейсы</button>
    <button class="tab" data-tab="inventory">📦 Инвентарь</button>
    <button class="tab" data-tab="history">📜 История</button>
    <button class="tab" data-tab="profile">⚙️ Профиль</button>
  </div>

  <!-- Вкладка Кейсы -->
  <div id="caseTab" class="tab-content active">
    <!-- Переключатель кейсов -->
    <div class="case-selector" id="caseSelector"></div>
    <!-- Карточка выбранного кейса и рулетка -->
    <div id="caseContent"></div>
  </div>

  <!-- Вкладка Инвентарь -->
  <div id="inventoryTab" class="tab-content">
    <div class="skin-list" id="inventoryList">Загрузка...</div>
  </div>

  <!-- Вкладка История -->
  <div id="historyTab" class="tab-content">
    <div class="skin-list" id="historyList">Загрузка...</div>
  </div>

  <!-- Вкладка Профиль -->
  <div id="profileTab" class="tab-content">
    <div class="profile-box">
      <p style="margin-bottom:12px;">🔗 Трейд-ссылка Steam</p>
      <input type="text" id="tradeLinkInput" class="input-field" placeholder="https://steamcommunity.com/tradeoffer/...">
      <button class="save-btn" onclick="saveTradeLink()">Сохранить</button>
      <p id="profileStatus" style="margin-top:12px; color:#8892a4;"></p>
    </div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-card">
    <img id="popupImg" src="" alt="Скин">
    <h3 id="popupName"></h3>
    <p class="pprice" id="popupPrice"></p>
    <button class="btn btn-open" onclick="hidePopup()">OK</button>
  </div>
</div>

<script>
  // ========== НАСТРОЙКИ ==========
  const tg = window.Telegram.WebApp;
  const user = tg.initDataUnsafe.user;
  const userId = user ? user.id : 0;

  const urlParams = new URLSearchParams(window.location.search);
  const userRefs = parseInt(urlParams.get('refs')) || 0;

  // ⚠️ ЗАМЕНИТЕ НА ВАШ PYTHONANYWHERE
  const API_BASE = 'https://dankochkurov.pythonanywhere.com';

  // ========== КЕЙСЫ ==========
  const cases = {
    poor: {
      key: 'poor',
      name: "Нищий бомж",
      image: "https://sun1-20.userapi.com/s/v1/ig2/prRqn2oX_IhYp3YxwQElULppGUz-V1QYuq0VlHtwrSw-Jh-Aqrgni96lVvw69v2o3CohCNPp1HUZxNoVqsjoR1k7.jpg?quality=96&as=32x32,48x48,72x72,108x108,160x160,240x240,360x360,480x480,540x540,640x640,720x720,1080x1080,1252x1252&from=bu&cs=640x0",
      refs: 3,
      skins: [
        { name: 'M4A4 | Choppa (FT)', price: '~9.5 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Choppa%20(Field-Tested).webp', rarity: 'expensive', chance: 3 },
        { name: 'AK-47 | Olive Polycam (WW)', price: '~8.7 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20Olive%20Polycam%20(Field-Tested).webp', rarity: 'expensive', chance: 3 },
        { name: 'R8 Revolver | Grip (FT)', price: '~7.2 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/R8%20Revolver%20%7C%20Grip%20(Field-Tested).webp', rarity: 'expensive', chance: 3 },
        { name: 'M4A4 | Steel Work (FT)', price: '~0.8 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Steel%20Work%20(Field-Tested).webp', rarity: 'cheap', chance: 18 },
        { name: 'SSG 08 | Calligrafaux (WW)', price: '~1.1 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/SSG%2008%20%7C%20Calligrafaux%20(Well-Worn).webp', rarity: 'cheap', chance: 18 },
        { name: 'Glock-18 | Ocean Topo (FT)', price: '~0.6 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Ocean%20Topo%20(Field-Tested).webp', rarity: 'cheap', chance: 18 },
        { name: 'AK-47 | VariCamo Grey (FT)', price: '~1.5 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20VariCamo%20Grey%20(Field-Tested).webp', rarity: 'cheap', chance: 18 },
        { name: 'M4A1-S | Wash me plz (FT)', price: '~0.9 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/M4A1-S%20%7C%20Wash%20me%20plz%20(Field-Tested).webp', rarity: 'cheap', chance: 18 },
        { name: 'Glock-18 | Moonrise (FT)', price: '~98 ₽', img: 'https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Moonrise%20(Field-Tested).webp', rarity: 'impossible', chance: 1 }
      ]
    },
    normal: {
      key: 'normal',
      name: "Обычный бомж",
      image: "https://cs5.pikabu.ru/post_img/big/2014/08/26/10/1409067764_722596962.jpg",
      refs: 5,
      skins: []  // заполните позже
    },
    rich: {
      key: 'rich',
      name: "Богатый бомж",
      image: "https://vse-dengy.ru/wp-content/uploads/1591600351.jpg",
      refs: 10,
      skins: []
    }
  };
  // Заглушка для пустых кейсов
  for (let k in cases) {
    if (!cases[k].skins.length) {
      cases[k].skins = [{ name: '??? (скоро)', price: '?', img: 'https://via.placeholder.com/130?text=Soon', rarity: 'cheap', chance: 100 }];
    }
  }

  // ========== ТЕКУЩИЙ ВЫБРАННЫЙ КЕЙС ==========
  let selectedCaseKey = 'poor'; // по умолчанию

  // ========== DOM ЭЛЕМЕНТЫ (динамические) ==========
  const caseSelector = document.getElementById('caseSelector');
  const caseContent = document.getElementById('caseContent');

  // ========== РЕНДЕР ПЕРЕКЛЮЧАТЕЛЯ КЕЙСОВ ==========
  function renderCaseSelector() {
    caseSelector.innerHTML = '';
    for (let key in cases) {
      const c = cases[key];
      const div = document.createElement('div');
      div.className = 'case-option' + (key === selectedCaseKey ? ' active' : '');
      div.dataset.key = key;
      div.innerHTML = `
        <img src="${c.image}" alt="${c.name}">
        <div class="cname">${c.name}</div>
        <div class="crefs">${c.refs} рефералов</div>
      `;
      div.addEventListener('click', () => {
        selectedCaseKey = key;
        renderCaseSelector();
        buildCaseContent();
      });
      caseSelector.appendChild(div);
    }
  }

  // ========== ПОСТРОЕНИЕ СОДЕРЖИМОГО КЕЙСА ==========
  let currentRoll = null; // объект рулетки
  function buildCaseContent() {
    const c = cases[selectedCaseKey];
    const canOpen = userRefs >= c.refs;

    // Строим HTML карточки и рулетки
    caseContent.innerHTML = `
      <div class="case-card">
        <img src="${c.image}" alt="${c.name}">
        <h2>${c.name}</h2>
        <div class="price">${c.refs} рефералов</div>
      </div>
      <div class="roulette-wrap">
        <div class="indicator indicator-top"></div>
        <div class="indicator indicator-bottom"></div>
        <div class="viewport" id="viewport">
          <div class="strip-track" id="stripTrack"></div>
        </div>
      </div>
      <div class="btns-row">
        <button class="btn btn-open" id="btnOpen" ${canOpen ? '' : 'disabled'}>🔓 Открыть${canOpen ? '' : ' (нужно ' + c.refs + ' реф.)'}</button>
        <button class="btn btn-fast" id="btnFast" ${canOpen ? '' : 'disabled'}>⚡ Быстро${canOpen ? '' : ' (нужно ' + c.refs + ' реф.)'}</button>
      </div>
      <div class="contents-box" id="caseContents"></div>
      <div class="status-msg" id="statusMsg"></div>
    `;

    // Инициализация рулетки для выбранного кейса
    const skins = c.skins;
    const pool = [];
    skins.forEach(s => {
      if (s.rarity !== 'impossible') {
        for (let i = 0; i < s.chance; i++) pool.push(s);
      }
    });

    const stripTrack = document.getElementById('stripTrack');
    const btnOpen = document.getElementById('btnOpen');
    const btnFast = document.getElementById('btnFast');
    const caseContents = document.getElementById('caseContents');
    const statusMsg = document.getElementById('statusMsg');
    let isRolling = false;
    const itemWidth = 138;

    function buildStrip() {
      stripTrack.innerHTML = '';
      const repeat = 12;
      for (let r = 0; r < repeat; r++) {
        skins.forEach(skin => {
          const div = document.createElement('div');
          div.className = `skin-item bg-${skin.rarity}`;
          div.innerHTML = `<img src="${skin.img}" alt="${skin.name}"><div class="name">${skin.name.split(' (')[0]}</div>`;
          stripTrack.appendChild(div);
        });
      }

      caseContents.innerHTML = '<h4>📦 Содержимое кейса</h4>';
      skins.forEach(skin => {
        const row = document.createElement('div');
        row.className = 'content-row';
        row.innerHTML = `
          <div class="content-skin">
            <img src="${skin.img}" alt="${skin.name}">
            <span>${skin.name}</span>
          </div>
          <div class="content-chance">${skin.chance}%</div>`;
        caseContents.appendChild(row);
      });
    }

    function getRandomSkin() {
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function roll(finalSkin, speed = 'normal') {
      const totalItems = stripTrack.children.length;
      const targetName = finalSkin.name.split(' (')[0];
      let finalIndex = 0;
      for (let i = 0; i < totalItems; i++) {
        if (stripTrack.children[i].querySelector('.name').textContent === targetName) {
          finalIndex = i;
          break;
        }
      }
      const viewportW = document.getElementById('viewport').clientWidth;
      const extraOffset = -3 * totalItems * itemWidth;
      const finalOffset = -finalIndex * itemWidth + viewportW / 2 - itemWidth / 2;
      const startTrans = extraOffset + finalOffset;
      const duration = speed === 'fast' ? 2500 : 7000;
      const startTime = performance.now();

      function anim(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        stripTrack.style.transform = `translateX(${startTrans * ease}px)`;
        if (progress < 1) requestAnimationFrame(anim);
        else finishRoll(finalSkin);
      }
      requestAnimationFrame(anim);
    }

    function finishRoll(skin) {
      isRolling = false;
      btnOpen.disabled = !canOpen;
      btnFast.disabled = !canOpen;
      showPopup(skin);
      tg.sendData(JSON.stringify({
        action: "drop_skin",
        skin: { name: skin.name, price: skin.price, image: skin.img, rarity: skin.rarity }
      }));
    }

    function startOpen(speed = 'normal') {
      if (!canOpen) {
        alert(`Нужно ${c.refs} рефералов. У вас ${userRefs}.`);
        return;
      }
      if (isRolling) return;
      isRolling = true;
      btnOpen.disabled = true;
      btnFast.disabled = true;
      statusMsg.textContent = speed === 'fast' ? 'Быстрое открытие...' : 'Крутим...';
      roll(getRandomSkin(), speed);
    }

    btnOpen.addEventListener('click', () => startOpen('normal'));
    btnFast.addEventListener('click', () => startOpen('fast'));

    buildStrip();
  }

  // ========== ОБЩИЕ ФУНКЦИИ ==========
  function showPopup(skin) {
    document.getElementById('popupImg').src = skin.img;
    document.getElementById('popupName').textContent = skin.name;
    document.getElementById('popupPrice').textContent = skin.price;
    document.getElementById('popup').style.display = 'flex';
  }
  window.hidePopup = function() {
    document.getElementById('popup').style.display = 'none';
  };

  async function loadInventory() {
    const list = document.getElementById('inventoryList');
    try {
      const res = await fetch(`${API_BASE}/api/inventory?user_id=${userId}`);
      const skins = await res.json();
      if (!skins.length) {
        list.innerHTML = 'Пусто.';
        return;
      }
      list.innerHTML = skins.map(s => `
        <div class="skin-card">
          <img src="${s.image}" alt="${s.name}">
          <div class="skin-info">
            <div class="skin-name">${s.name}</div>
            <div class="skin-price">${s.price}</div>
          </div>
          <button class="withdraw-btn" onclick="withdrawSkin(${s.id})">Вывести</button>
        </div>
      `).join('');
    } catch (e) {
      list.innerHTML = 'Ошибка загрузки инвентаря.';
    }
  }

  async function loadHistory() {
    const list = document.getElementById('historyList');
    try {
      const res = await fetch(`${API_BASE}/api/history?user_id=${userId}`);
      const hist = await res.json();
      if (!hist.length) {
        list.innerHTML = 'Пусто.';
        return;
      }
      list.innerHTML = hist.map(s => `
        <div class="skin-card">
          <img src="${s.image}" alt="${s.name}">
          <div class="skin-info">
            <div class="skin-name">${s.name}</div>
            <div class="skin-price">${s.price}</div>
            <div style="font-size:12px; color:#8892a4;">${s.date ? s.date.substring(0,10) : ''}</div>
          </div>
        </div>
      `).join('');
    } catch (e) {
      list.innerHTML = 'Ошибка загрузки истории.';
    }
  }

  function withdrawSkin(skinId) {
    tg.sendData(JSON.stringify({ action: "withdraw_skin", skin_id: skinId }));
    alert('Заявка на вывод отправлена. Ожидайте до 2 дней.');
  }

  function saveTradeLink() {
    const link = document.getElementById('tradeLinkInput').value.trim();
    if (!link.startsWith('https://steamcommunity.com/tradeoffer')) {
      document.getElementById('profileStatus').textContent = '❌ Неверный формат ссылки.';
      return;
    }
    tg.sendData(JSON.stringify({ action: "update_trade_link", link }));
    document.getElementById('profileStatus').textContent = '✅ Ссылка сохранена.';
  }

  // Переключение вкладок
  function setupTabs() {
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
        if (btn.dataset.tab === 'inventory') loadInventory();
        if (btn.dataset.tab === 'history') loadHistory();
      });
    });
  }

  // Инициализация
  renderCaseSelector();
  buildCaseContent();
  setupTabs();
</script>
</body>
</html>
