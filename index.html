<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🎁 Кейс за 3 реферала</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1d23;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      color: #fff;
    }

    .case-container {
      background: linear-gradient(145deg, #21252e, #191c23);
      border: 2px solid #c9a24d;
      border-radius: 24px;
      padding: 24px 20px 32px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 0 40px rgba(201, 162, 77, 0.15);
    }

    .case-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(180deg, #f6c358 0%, #e0911a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .case-subtitle {
      font-size: 13px;
      color: #8892a4;
      margin-bottom: 24px;
    }

    .roulette-window {
      background: #0e0f14;
      border-radius: 16px;
      padding: 20px 0 16px;
      margin-bottom: 28px;
      border: 1px solid #2a2d35;
      overflow: hidden;
      position: relative;
    }

    .skin-card {
      width: 180px;
      height: 130px;
      margin: 0 auto;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .skin-card img {
      max-width: 85%;
      max-height: 85%;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
      transition: opacity 0.2s;
    }

    /* Фоны по редкости */
    .bg-cheap       { background: transparent; }
    .bg-expensive   { background: radial-gradient(circle, #e74c3c55 0%, #e74c3c22 70%, transparent 100%); }
    .bg-impossible  { background: radial-gradient(circle, #f1c40f55 0%, #f1c40f22 70%, transparent 100%); }

    .skin-name {
      font-size: 14px;
      font-weight: 600;
      margin: 12px 0 4px;
      color: #e0e0e0;
    }

    .skin-price {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
    }

    .price-cheap      { background: #2a2d35; color: #aaa; }
    .price-expensive  { background: #e74c3c22; color: #e74c3c; }
    .price-impossible { background: #f1c40f22; color: #f1c40f; }

    .open-btn {
      background: linear-gradient(180deg, #f6c358 0%, #d4941a 100%);
      border: none;
      color: #1a1d23;
      font-weight: 700;
      font-size: 18px;
      padding: 14px 32px;
      border-radius: 50px;
      width: 100%;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(201, 162, 77, 0.3);
      letter-spacing: 0.5px;
    }

    .open-btn:active { transform: scale(0.96); }
    .open-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(30%);
    }

    .status-text {
      margin-top: 16px;
      font-size: 14px;
      color: #8892a4;
      min-height: 20px;
    }

    /* Анимация тряски для невозможного дропа */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%     { transform: translateX(-6px); }
      75%     { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease-in-out; }
  </style>
</head>
<body>
  <div class="case-container">
    <div class="case-title">🎁 Кейс за 3 реферала</div>
    <div class="case-subtitle">Пригласи 3 друзей и открой кейс</div>

    <div class="roulette-window">
      <div class="skin-card" id="skinCard">
        <img id="skinImage" src="" alt="Скин">
      </div>
      <div class="skin-name" id="skinName">—</div>
      <div class="skin-price" id="skinPrice">—</div>
    </div>

    <button class="open-btn" id="openButton">🔓 Открыть кейс</button>
    <div class="status-text" id="statusText">Нажми на кнопку, чтобы испытать удачу</div>
  </div>

  <script>
    // ========================
    //  КОНФИГУРАЦИЯ СКИНОВ
    // ========================
    const skins = [
      // --- Дорогие (шанс 3%, красный фон) ---
      {
        name: 'M4A4 | Choppa (FT)',
        price: '~9.5 ₽',
        img: 'https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Choppa%20(Field-Tested).webp',
        rarity: 'expensive',
        chance: 3
      },
      {
        name: 'AK-47 | Olive Polycam (WW)',
        price: '~8.7 ₽',
        img: 'https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20Olive%20Polycam%20(Field-Tested).webp',
        rarity: 'expensive',
        chance: 3
      },
      {
        name: 'R8 Revolver | Grip (FT)',
        price: '~7.2 ₽',
        img: 'https://cdn2.csgo.com/item/image/width=916/R8%20Revolver%20%7C%20Grip%20(Field-Tested).webp',
        rarity: 'expensive',
        chance: 3
      },

      // --- Дешёвые (шанс 18%, без фона) ---
      {
        name: 'M4A4 | Steel Work (FT)',
        price: '~0.8 ₽',
        img: 'https://cdn2.csgo.com/item/image/width=916/M4A4%20%7C%20Steel%20Work%20(Field-Tested).webp',
        rarity: 'cheap',
        chance: 18
      },
      {
        name: 'SSG 08 | Calligrafaux (WW)',
        price: '~1.1 ₽',
        img: 'https://cdn2.csgo.com/item/image/width=916/SSG%2008%20%7C%20Calligrafaux%20(Well-Worn).webp',
        rarity: 'cheap',
        chance: 18
      },
      {
        name: 'Glock-18 | Ocean Topo (FT)',
        price: '~0.6 ₽',
        img: 'https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Ocean%20Topo%20(Field-Tested).webp',
        rarity: 'cheap',
        chance: 18
      },
      {
        name: 'AK-47 | VariCamo Grey (FT)',
        price: '~1.5 ₽',
        img: 'https://cdn2.csgo.com/item/image/width=916/AK-47%20%7C%20VariCamo%20Grey%20(Field-Tested).webp',
        rarity: 'cheap',
        chance: 18
      },
      {
        name: 'M4A1-S | Wash me plz (FT)',
        price: '~0.9 ₽',
        img: 'https://cdn2.csgo.com/item/image/width=916/M4A1-S%20%7C%20Wash%20me%20plz%20(Field-Tested).webp',
        rarity: 'cheap',
        chance: 18
      },

      // --- Невозможный (шанс 0%, жёлтый фон) ---
      {
        name: 'Glock-18 | Moonrise (FT)',
        price: '∞',
        img: 'https://cdn2.csgo.com/item/image/width=916/Glock-18%20%7C%20Moonrise%20(Field-Tested).webp',
        rarity: 'impossible',
        chance: 0
      }
    ];

    // Проверка сумм шансов (должна быть 99, можно докинуть 1% на невозможный)
    const totalChance = skins.reduce((sum, s) => sum + s.chance, 0);
    console.assert(totalChance <= 100, 'Сумма шансов больше 100%!');

    // Построение массива для быстрого выбора по шансам
    const chancePool = [];
    skins.forEach(skin => {
      for (let i = 0; i < skin.chance; i++) chancePool.push(skin);
    });
    // Если нужно добить до 100 — заполним последним дешёвым скином
    while (chancePool.length < 100) {
      chancePool.push(skins.find(s => s.rarity === 'cheap'));
    }

    // ========================
    //  DOM-ЭЛЕМЕНТЫ
    // ========================
    const skinCard   = document.getElementById('skinCard');
    const skinImage  = document.getElementById('skinImage');
    const skinName   = document.getElementById('skinName');
    const skinPrice  = document.getElementById('skinPrice');
    const openButton = document.getElementById('openButton');
    const statusText = document.getElementById('statusText');

    let isRolling = false;

    // ========================
    //  ФУНКЦИЯ ВЫБОРА СЛУЧАЙНОГО СКИНА
    // ========================
    function getRandomSkin() {
      const rand = Math.floor(Math.random() * chancePool.length);
      return chancePool[rand];
    }

    // ========================
    //  ОБНОВЛЕНИЕ КАРТОЧКИ
    // ========================
    function updateCard(skin) {
      skinCard.className = 'skin-card';
      skinCard.classList.add(`bg-${skin.rarity}`);

      skinImage.src = skin.img;
      skinImage.alt = skin.name;

      skinName.textContent = skin.name;

      skinPrice.textContent = skin.price;
      skinPrice.className = 'skin-price';
      skinPrice.classList.add(`price-${skin.rarity}`);
    }

    // ========================
    //  АНИМАЦИЯ ПРОКРУТКИ
    // ========================
    function startRoll(finalSkin) {
      const allSkins = [...skins];
      let currentIndex = 0;
      let tickCount = 0;
      const totalTicks = 35 + Math.floor(Math.random() * 15); // 35-50 смен
      let interval = 40; // начальная скорость (мс)

      const tick = () => {
        // Показываем случайный скин (не финальный)
        let skinToShow;
        if (tickCount < totalTicks - 3) {
          // Случайный, но не финальный
          const others = allSkins.filter(s => s !== finalSkin);
          skinToShow = others[Math.floor(Math.random() * others.length)];
        } else {
          // Последние 3 тика — финальный скин
          skinToShow = finalSkin;
        }

        updateCard(skinToShow);
        tickCount++;

        if (tickCount < totalTicks) {
          // Замедление в конце
          if (tickCount > totalTicks * 0.6) {
            interval += 12;
          }
          setTimeout(tick, interval);
        } else {
          // Финиш
          finishRoll(finalSkin);
        }
      };

      tick();
    }

    function finishRoll(skin) {
      isRolling = false;
      openButton.disabled = false;

      if (skin.rarity === 'impossible') {
        statusText.innerHTML = '🎉 НЕВЕРОЯТНО! Выпал <b>Glock-18 | Moonrise</b>! (шанс 0%)';
        skinCard.classList.add('shake');
        setTimeout(() => skinCard.classList.remove('shake'), 500);
      } else {
        statusText.innerHTML = `🎉 Выпал: <b>${skin.name}</b> (${skin.price})`;
      }
    }

    // ========================
    //  ОБРАБОТЧИК КНОПКИ
    // ========================
    openButton.addEventListener('click', () => {
      if (isRolling) return;
      isRolling = true;
      openButton.disabled = true;
      statusText.textContent = 'Крутим...';

      const finalSkin = getRandomSkin();
      startRoll(finalSkin);
    });

    // ========================
    //  ИНИЦИАЛИЗАЦИЯ
    // ========================
    // Показываем первый дешёвый скин по умолчанию
    const defaultSkin = skins.find(s => s.rarity === 'cheap');
    updateCard(defaultSkin);
  </script>
</body>
</html>
